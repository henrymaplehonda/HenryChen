:7px;padding:10px;max-height:200px;overflow-y:auto;\">\n            ${WARRANTY_PLANS.map((p) => {\n              const tier = m2 ? warrantyTier(m2) : 'civic';\n              const cost = getWarrantyPrice(p, tier);\n              if (!cost) return '';\n              const isSel = warrantySelected?.label === p.label;\n              const bwWithW = fbw(cap2+gapAmt+cost, term, rt);\n              return '<div style=\"display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);gap:6px\">'\n                + '<div style=\"font-size:11px;' + (isSel?'color:var(--green);font-weight:700':'color:var(--dim)') + '\">' + p.label + '</div>'\n                + '<div style=\"font-size:11px;font-weight:600\">$' + cost.toLocaleString() + '</div>'\n                + '<div style=\"font-size:11px;color:var(--green)\">' + ca$c(bwWithW) + '/2wk</div>'\n                + '<button onclick=\"selectWarranty(\\'' + p.label + '\\',' + cost + ')\" style=\"font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer;font-family:inherit;background:' + (isSel?'rgba(0,212,122,.2)':'none') + ';border:1px solid ' + (isSel?'var(--green)':'var(--border2)') + ';color:' + (isSel?'var(--green)':'var(--dim)') + '\">' + (isSel?'\u2713':'Select') + '</button>'\n                + '</div>';\n            }).join('')}\n          </div>` : ''}\n          ${warrantySelected ? `\n          <div style=\"margin-top:6px;padding:8px 10px;background:rgba(0,212,122,.06);border:1px solid var(--green-bdr);border-radius:5px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n              <span style=\"font-size:12px;color:var(--green)\">With GAP + Warranty:</span>\n              <span style=\"font-size:20px;font-weight:700;color:var(--green)\">${ca$c(bwgp)}/2wk</span>\n            </div>\n            <div style=\"font-size:11px;color:rgba(0,212,122,.5);text-align:right\">${ca$c(mogp)}/mo</div>\n          </div>` : ''}\n        </div>\n      </div>\n    </div>`;\n}\n\nfunction toggleBreakdown() {\n  breakdownOpen = !breakdownOpen;\n  render();\n}\n\nfunction renderBreakdown(m, r, res36obj, res60obj, l36mo, l36bw, l60mo, l60bw, f60mo, f60bw, f84mo, f84bw) {\n  const fees   = getFees(m);\n  const p      = r.price;\n  const dp     = downPayment;\n  const cap    = p - dp;\n  const ob     = optBW(), om = bw2mo(ob);\n\n  // Incentive totals\n  const incAmt  = m.inc ? m.inc.reduce((s, i) => {\n    const n = parseFloat(i.match(/\\$([\\d,]+)/)?.[1]?.replace(',','') || 0);\n    return s + n;\n  }, 0) : 0;\n\n  // Lease term tab \u2014 default 60 if available, else 36\n  const hasl60  = l60mo !== null;\n\n  function leaseSection(months, monthly, biw, resObj) {\n    const r2   = R(m);\n    const rate = months === 36 ? r2.lr36 : r2.lr60;\n    const res  = resObj.val;\n    const amort = cap - res;\n    const nPmtR = Math.round(months * 26 / 12);\n    const firstPmt  = monthly + om + (months===60&&optLeaseGuard?OPT_LEASEGUARD_PRO:0);\n    const totalPmts = firstPmt * nPmtR;\n    const dueDel    = firstPmt + 8.50 + 40.00;\n    const totalKM   = kmAllowance * (months / 12);\n    const anchorId  = months === 36 ? 'bk-l36' : 'bk-l60';\n    return `\n      <div class=\"bk-section\" id=\"${anchorId}\">\n        <div class=\"bk-sec-title-big\">\ud83d\ude97 Lease \u00b7 ${months} months @ ${rate}% APR${m.promo&&m.promo.term===months?' \u26a1 Promo':''}</div>\n        <div class=\"bk-row\"><span class=\"bk-lbl\">Selling Price (Cap Cost)</span><span class=\"bk-val\">${ca$(p)}</span></div>\n        ${dp > 0 ? `<div class=\"bk-row deduct\"><span class=\"bk-lbl indent\">\u2212 Down Payment</span><span class=\"bk-val\">(${ca$(dp)})</span></div>` : ''}\n        ${(tradeInVal-tradeInOwing)!==0?`<div class=\"bk-row deduct\"><span class=\"bk-lbl indent\">${tradeInVal-tradeInOwing>0?'\u2212 Trade-In Equity':'+ Neg. Equity'}</span><span class=\"bk-val\">(${ca$(Math.abs(tradeInVal-tradeInOwing))})</span></div>`:''}\n        <div class=\"bk-row\"><span class=\"bk-lbl\">Adjusted Cap Cost</span><span class=\"bk-val\">${ca$(cap)}</span></div>\n        <div class=\"bk-row\">\n          <span class=\"bk-lbl\">Residual Value\n            <span class=\"${resObj.confirmed?'bk-confirmed':'bk-estimate'}\">${resObj.confirmed?'\u2713 '+resObj.src:'\u26a0 '+resObj.src}</span>\n          </span>\n          <span class=\"bk-val\">${ca$(res)} (${(resObj.pct*100).toFixed(1)}%)</span>\n        </div>\n        <div class=\"bk-row\"><span class=\"bk-lbl\">Amount to Amortize</span><span class=\"bk-val\">${ca$(amort)}</span></div>\n        <div class=\"bk-row total\"><span class=\"bk-lbl\">Bi-Weekly Payment</span><span class=\"bk-val\">${ca$c(biw + om + (months===60&&optLeaseGuard?OPT_LEASEGUARD_PRO:0))}/2wk</span></div>\n        <div class=\"bk-row\"><span class=\"bk-lbl\">Monthly Equivalent</span><span class=\"bk-val\">${ca$c(monthly + om + (months===60&&optLeaseGuard?OPT_LEASEGUARD_PRO:0))}/mo</span></div>\n        <div class=\"bk-row indent\"><span class=\"bk-lbl\"># of Bi-Weekly Payments</span><span class=\"bk-val\">${nPmtR}</span></div>\n        <div class=\"bk-row indent\"><span class=\"bk-lbl\">Total of Payments</span><span class=\"bk-val\">${ca$(totalPmts)}</span></div>\n        <div class=\"bk-row indent\"><span class=\"bk-lbl\">KM Allowance</span><span class=\"bk-val\">${kmAllowance.toLocaleString()}/yr \u00b7 ${totalKM.toLocaleString()} total</span></div>\n        ${kmAllowance>24000?`<div class=\"bk-row indent\"><span class=\"bk-lbl\">Extra KM Prepaid</span><span class=\"bk-val\">$${((kmAllowance-24000)*(months/12)*0.08).toLocaleString()} (incl.)</span></div>`:''}\n        <div class=\"bk-delivery\">\n          <div class=\"bk-delivery-title\">Due at Delivery</div>\n          <div class=\"bk-row\"><span class=\"bk-lbl\">First Payment</span><span class=\"bk-val\">${ca$c(firstPmt)}</span></div>\n          <div class=\"bk-row\"><span class=\"bk-lbl\">Registering Agent Fee</span><span class=\"bk-val\">$8.50</span></div>\n          <div class=\"bk-row\"><span class=\"bk-lbl\">PPSA Registration</span><span class=\"bk-val\">$40.00</span></div>\n          <div class=\"bk-row total\"><span class=\"bk-lbl\">Total Due at Delivery</span><span class=\"bk-val\">${ca$c(dueDel)}</span></div>\n        </div>\n      </div>`;\n  }\n\n  function finSection(months, monthly, biw) {\n    const r2   = R(m);\n    const rate = months === 60 ? r2.fr60 : r2.fr84;\n    const nPmt = months;\n    const totalPmts = monthly * nPmt;\n    const totalCost = totalPmts - cap;\n    const anchorId  = months === 60 ? 'bk-f60' : 'bk-f84';\n    return `\n      <div class=\"bk-section\" id=\"${anchorId}\">\n        <div class=\"bk-sec-title-big\">\ud83d\udcb3 Finance \u00b7 ${months} months @ ${rate}% APR</div>\n        <div class=\"bk-row\"><span class=\"bk-lbl\">Principal (after down payment)</span><span class=\"bk-val\">${ca$(cap)}</span></div>\n        <div class=\"bk-row total\"><span class=\"bk-lbl\">Bi-Weekly Payment</span><span class=\"bk-val\">${ca$c(biw)}/2wk</span></div>\n        <div class=\"bk-row\"><span class=\"bk-lbl\">Monthly Payment</span><span class=\"bk-val\">${ca$c(monthly)}/mo</span></div>\n        <div class=\"bk-row indent\"><span class=\"bk-lbl\"># of Monthly Payments</span><span class=\"bk-val\">${nPmt}</span></div>\n        <div class=\"bk-row indent\"><span class=\"bk-lbl\">Total of Payments</span><span class=\"bk-val\">${ca$(totalPmts)}</span></div>\n        <div class=\"bk-row indent\"><span class=\"bk-lbl\">Total Cost of Borrowing</span><span class=\"bk-val\">${ca$(totalCost)}</span></div>\n        <div style=\"margin-top:10px;font-size:13px;font-weight:700;color:var(--green);padding-bottom:6px;border-bottom:1px solid var(--border)\">+ GAP Insurance ($${gapAmt.toLocaleString()})</div>\n        <div class=\"bk-row\"><span class=\"bk-lbl\">Monthly w/ GAP</span><span class=\"bk-val\">${ca$c(fmo(cap+gapAmt,months,rate))}/mo</span></div>\n        <div class=\"bk-row\"><span class=\"bk-lbl\">Bi-Weekly w/ GAP</span><span class=\"bk-val\">${ca$c(fbw(cap+gapAmt,months,rate))}/2wk</span></div>\n      </div>`;\n  }\n\n  return `\n    <div class=\"bk-panel\">\n      <div class=\"bk-tab-nav\">\n        <span style=\"font-size:12px;font-weight:700;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;align-self:center\">Breakdown</span>\n        <button class=\"bk-tab-btn\" onclick=\"document.getElementById('bk-price').scrollIntoView({behavior:'smooth',block:'start'})\">\ud83d\udcb0 Price</button>\n        <button class=\"bk-tab-btn\" onclick=\"document.getElementById('bk-l36').scrollIntoView({behavior:'smooth',block:'start'})\">Lease 3yr</button>\n        ${hasl60 ? `<button class=\"bk-tab-btn\" onclick=\"document.getElementById('bk-l60').scrollIntoView({behavior:'smooth',block:'start'})\">Lease 5yr</button>` : ''}\n        <button class=\"bk-tab-btn\" onclick=\"document.getElementById('bk-f60').scrollIntoView({behavior:'smooth',block:'start'})\">Finance 5yr</button>\n        <button class=\"bk-tab-btn\" onclick=\"document.getElementById('bk-f84').scrollIntoView({behavior:'smooth',block:'start'})\">Finance 7yr</button>\n        <button class=\"bk-hide-btn\" onclick=\"breakdownOpen=false;render()\">\u2715 Hide Breakdown</button>\n      </div>\n      <div class=\"bk-body\">\n        <div class=\"bk-2col\">\n\n          <!-- LEFT: PRICE BREAKDOWN -->\n          <div id=\"bk-price\">\n            <div class=\"bk-sec-title-big\">\ud83d\udcb0 Price Breakdown</div>\n            <div class=\"bk-section\">\n              <div class=\"bk-section-title\">Vehicle Pricing</div>\n              <div class=\"bk-row\"><span class=\"bk-lbl\">MSRP</span><span class=\"bk-val\">${ca$(m.msrp)}</span></div>\n              <div class=\"bk-row indent\"><span class=\"bk-lbl\">Freight & PDI</span><span class=\"bk-val\">${ca$(fees.fpdi)}</span></div>\n              <div class=\"bk-row indent\"><span class=\"bk-lbl\">Federal A/C Excise</span><span class=\"bk-val\">${ca$(fees.ac)}</span></div>\n              <div class=\"bk-row indent\"><span class=\"bk-lbl\">OMVIC</span><span class=\"bk-val\">${ca$(fees.omvic)}</span></div>\n              <div class=\"bk-row indent\"><span class=\"bk-lbl\">Environmental</span><span class=\"bk-val\">${ca$(fees.env)}</span></div>\n              <div class=\"bk-row indent\"><span class=\"bk-lbl\">${m.engine.includes('Hybrid')||m.engine.includes('Electric')?'EV Tire Duty Plus':'Tire Duty'}</span><span class=\"bk-val\">${ca$(fees.tire)}</span></div>\n              <div class=\"bk-row indent\"><span class=\"bk-lbl\">Dealer Fee</span><span class=\"bk-val\">${ca$(fees.dealer)}</span></div>\n              <div class=\"bk-row total\"><span class=\"bk-lbl\">Total Vehicle Price</span><span class=\"bk-val\">${ca$(m.msrp + fees.total)}</span></div>\n              ${dp > 0 ? `<div class=\"bk-row deduct\"><span class=\"bk-lbl indent\">\u2212 Down Payment</span><span class=\"bk-val\">(${ca$(dp)})</span></div>` : ''}\n              ${m.inc ? m.inc.map(i => `<div class=\"bk-row deduct\"><span class=\"bk-lbl indent\">\u2212 ${i}</span><span class=\"bk-val\">(${ca$(parseFloat(i.match(/\\$([\\d,]+)/)?.[1]?.replace(',',''))||0)})</span></div>`).join('') : ''}\n              <div class=\"bk-row highlight\"><span class=\"bk-lbl\">Selling Price (Before Tax)</span><span class=\"bk-val\">${ca$(p)}</span></div>\n              <div class=\"bk-row\"><span class=\"bk-lbl\" style=\"color:var(--dim)\">OTD (incl 13% HST)</span><span class=\"bk-val\" style=\"color:var(--dim)\">${ca$(m.otd)}</span></div>\n            </div>\n            ${m.inc ? `\n            <div class=\"bk-section\">\n              <div class=\"bk-section-title\">Applied Incentives (Apr 2026)</div>\n              ${m.inc.map(i=>`<div class=\"bk-row\"><span class=\"bk-lbl\">${i}</span><span class=\"bk-val\" style=\"color:var(--green)\">\u2713 Applied</span></div>`).join('')}\n              <div class=\"bk-row\" style=\"font-size:11px;color:var(--dim);margin-top:4px\"><span>Valid Apr 1\u201330, 2026 \u00b7 OAC</span></div>\n            </div>` : ''}\n          </div>\n\n          <!-- RIGHT: LEASE + FINANCE -->\n          <div>\n            ${leaseSection(36, l36mo, l36bw, res36obj)}\n            ${hasl60 ? leaseSection(60, l60mo, l60bw, res60obj) : ''}\n            ${finSection(60, f60mo, f60bw)}\n            ${finSection(84, f84mo, f84bw)}\n          </div>\n\n        </div>\n      </div>\n    </div>`;\n}\n\nfunction printQuote() {\n  if (!cur) return;\n  const m = cur, r = R(m);\n  const cap  = r.price - downPayment;\n  const ob   = optBW(), om = bw2mo(ob);\n  const wCost = warrantySelected ? warrantySelected.cost : 0;\n  const lgBW  = optLeaseGuard ? OPT_LEASEGUARD_PRO : 0;\n  const lgMO  = bw2mo(lgBW);\n\n  // Use selected terms for print\n  const lc1 = (()=>{const rt=lrForTerm(r,leaseTerm1);if(!rt)return null;const res=resForTerm(m,r,leaseTerm1);const mo=lmo(cap,res.val,leaseTerm1,rt);return {mo,bw:mo2bw(mo),res,rt};})();\n  const lc2 = (()=>{const rt=lrForTerm(r,leaseTerm2);if(!rt)return null;const res=resForTerm(m,r,leaseTerm2);const mo=lmo(cap,res.val,leaseTerm2,rt);return {mo,bw:mo2bw(mo),res,rt};})();\n  const fc1r = frForTerm(r,finTerm1), fc2r = frForTerm(r,finTerm2);\n  const fc1p = fc1r ? {bw:fbw(cap,finTerm1,fc1r),mo:fmo(cap,finTerm1,fc1r),bwg:fbw(cap+gapAmt+wCost,finTerm1,fc1r),mog:fmo(cap+gapAmt+wCost,finTerm1,fc1r),rt:fc1r} : null;\n  const fc2p = fc2r ? {bw:fbw(cap,finTerm2,fc2r),mo:fmo(cap,finTerm2,fc2r),bwg:fbw(cap+gapAmt+wCost,finTerm2,fc2r),mog:fmo(cap+gapAmt+wCost,finTerm2,fc2r),rt:fc2r} : null;\n\n  const addons = [\n    optColor ? `Colour +$${OPT_COLOR}/2wk` : '',\n    optWheelLock ? `Wheel Locks +$${OPT_WHEELLOCK}/2wk` : '',\n    optLeaseGuard ? `Lease Guard Pro +$${OPT_LEASEGUARD_PRO}/2wk` : '',\n  ].filter(Boolean).join(' \u00b7 ');\n\n  const incHtml = m.inc ? m.inc.map(i => `<span class=\"inc-tag\">${i}</span>`).join('') : '';\n\n  function pc(label, type, rows, note) {\n    return `\n      <div class=\"pcard ${type}\">\n        <div class=\"pc-head\">\n          <div class=\"pc-type\">${type.toUpperCase()}</div>\n          <div class=\"pc-label\">${label}</div>\n        </div>\n        <div class=\"pc-body\">\n          ${rows.map(([lbl,val,sm]) => `\n            <div class=\"pr ${sm?'sm':''}\">\n              <span class=\"pl\">${lbl}</span>\n              <span class=\"pv\">${val}</span>\n            </div>`).join('')}\n          ${note ? `<div class=\"pc-note\">${note}</div>` : ''}\n        </div>\n      </div>`;\n  }\n\n  // Build print rows using selected terms\n  function makeLeaseRows(lc, term) {\n    if (!lc) return [['N/A','STD rate \u2014 no promo',false]];\n    return [\n      ['Bi-Weekly', ca$c(lc.bw + ob + lgBW), false],\n      ['Monthly',   ca$c(lc.mo + om + lgMO), true],\n      ['Rate',      `${lc.rt}% APR`, true],\n      ['Residual',  `${ca$(lc.res.val)} (${(lc.res.pct*100).toFixed(1)}%)`, true],\n      ['KM/yr',     `${kmAllowance.toLocaleString()} km`, true],\n      ...(optLeaseGuard ? [['Lease Guard Pro',`+${ca$c(OPT_LEASEGUARD_PRO)}/2wk`,true]] : []),\n    ];\n  }\n\n  function makeFinRows(fcp, term) {\n    if (!fcp) return [['N/A','STD rate',false]];\n    const rows = [\n      ['Bi-Weekly', ca$c(fcp.bw), false],\n      ['Monthly',   ca$c(fcp.mo), true],\n      ['Rate',      `${fcp.rt}% APR`, true],\n      ['','',true],\n      ['+ GAP Bi-Wkly', ca$c(fbw(cap+gapAmt,term,fcp.rt)), false],\n      ['+ GAP Monthly',  ca$c(fmo(cap+gapAmt,term,fcp.rt)), true],\n    ];\n    if (warrantySelected) {\n      rows.push(['','',true]);\n      rows.push([`+GAP+Warranty Bi-Wkly`, ca$c(fcp.bwg), false]);\n      rows.push([`+GAP+Warranty Monthly`, ca$c(fcp.mog), true]);\n    }\n    return rows;\n  }\n\n  const html = `<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"UTF-8\">\n<title>Quote \u2014 ${m.name} ${m.trim}</title>\n<style>\n  * { margin:0; padding:0; box-sizing:border-box; }\n  body { font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; color:#111; background:#fff; padding:20px 24px; }\n\n  /* HEADER */\n  .hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; padding-bottom:12px; border-bottom:3px solid #E40521; }\n  .logo { display:flex; align-items:center; gap:10px; }\n  .logo-h { width:34px; height:34px; background:#E40521; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900; color:#fff; }\n  .logo-text { font-size:15px; font-weight:700; }\n  .logo-sub  { font-size:11px; color:#666; }\n  .hdr-right { text-align:right; font-size:11px; color:#666; line-height:1.7; }\n  .hdr-right b { color:#111; }\n\n  /* VEHICLE INFO */\n  .veh { margin-bottom:12px; }\n  .veh-name { font-size:22px; font-weight:800; letter-spacing:-.5px; color:#111; }\n  .veh-trim { color:#666; font-weight:400; }\n  .veh-sub  { display:flex; gap:16px; flex-wrap:wrap; margin-top:5px; font-size:12px; color:#555; }\n  .veh-sub b { color:#111; }\n  .veh-sub .price { font-size:16px; font-weight:700; color:#E40521; }\n  .inc-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }\n  .inc-tag { font-size:10px; font-weight:700; background:#f0faf5; border:1px solid #b2dfc8; color:#1a7a45; padding:2px 8px; border-radius:3px; }\n\n  /* PAYMENT GRID */\n  .pgrid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; margin-bottom:12px; }\n  .pcard { border-radius:8px; overflow:hidden; border:1px solid #ddd; }\n  .pcard.lease .pc-head { background:#eef4ff; }\n  .pcard.finance .pc-head { background:#efffef; }\n  .pc-head { padding:8px 12px; }\n  .pc-type { font-size:9px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; }\n  .pcard.lease .pc-type { color:#2060c0; }\n  .pcard.finance .pc-type { color:#1a7a45; }\n  .pc-label { font-size:12px; font-weight:600; color:#333; margin-top:1px; }\n  .pc-body { padding:10px 12px; }\n  .pr { display:flex; justify-content:space-between; align-items:baseline; padding:3px 0; }\n  .pr + .pr { border-top:1px solid #f0f0f0; }\n  .pl { font-size:11px; color:#666; }\n  .pv { font-size:11px; font-weight:600; color:#111; text-align:right; }\n  .pr:first-child .pv { font-size:18px; font-weight:800; color:#111; }\n  .pr:first-child .pl { font-size:12px; color:#333; }\n  .pr.sm .pv { font-size:11px; font-weight:500; color:#444; }\n  .pc-note { font-size:10px; color:#888; margin-top:6px; padding-top:6px; border-top:1px dashed #e0e0e0; }\n\n  /* DIVIDERS IN FINANCE */\n  .pr:empty { height:6px; border:none !important; }\n\n  /* OPTIONS BAR */\n  .opts-row { display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin-bottom:10px; padding:8px 12px; background:#f8f8f8; border-radius:6px; border:1px solid #e8e8e8; font-size:12px; }\n  .opts-row .lbl { font-weight:700; color:#444; }\n\n  /* WARRANTY */\n  .warranty-row { background:#f0faf5; border:1px solid #b2dfc8; border-radius:6px; padding:8px 12px; margin-bottom:10px; font-size:12px; }\n  .warranty-row b { color:#1a7a45; }\n\n  /* DISCLAIMER */\n  .disc { font-size:10px; color:#888; line-height:1.6; padding-top:10px; border-top:1px solid #ddd; }\n  .disc b { color:#555; }\n\n  /* ESTIMATE BADGE */\n  .est { font-size:9px; font-weight:700; background:#fff8e6; border:1px solid #f0c040; color:#8a6000; padding:1px 5px; border-radius:3px; margin-left:4px; }\n\n  @media print {\n    body { padding:12px 16px; }\n    @page { margin:10mm; size:landscape; }\n  }\n</style>\n</head>\n<body>\n\n<!-- HEADER -->\n<div class=\"hdr\">\n  <div class=\"logo\">\n    <div class=\"logo-h\">H</div>\n    <div>\n      <div class=\"logo-text\">Honda Quick Quote</div>\n      <div class=\"logo-sub\">Maple Honda \u00b7 Henry Chen \u00b7 647-523-6878</div>\n    </div>\n  </div>\n  <div class=\"hdr-right\">\n    <div><b>${new Date().toLocaleDateString('en-CA',{year:'numeric',month:'long',day:'numeric'})}</b></div>\n    <div>Data: ${DATA_DATE} \u00b7 \u26a0 Estimate only \u2014 verify at honda.ca</div>\n    <div>${kmAllowance.toLocaleString()} km/yr \u00b7 $0 + ${ca$(downPayment)} down</div>\n  </div>\n</div>\n\n<!-- VEHICLE -->\n<div class=\"veh\">\n  <div class=\"veh-name\">2026 ${m.name} <span class=\"veh-trim\">${m.trim}</span></div>\n  <div class=\"veh-sub\">\n    <span>MSRP: <b>${ca$(m.msrp)}</b></span>\n    <span class=\"price\">${ca$(r.price)}</span>\n    <span>Before Tax \u00b7 OTD (incl HST): <b>${ca$(m.otd)}</b></span>\n    ${downPayment > 0 ? `<span>Down: <b>(${ca$(downPayment)})</b> \u2192 Cap: <b>${ca$(cap)}</b></span>` : ''}\n    <span>${m.engine} \u00b7 ${m.drive}</span>\n    ${m.promo ? `<span>\u26a1 HFS Promo: <b>${m.promo.rate}% 60mo</b> to ${m.promo.exp}</span>` : ''}\n  </div>\n  ${incHtml ? `<div class=\"inc-tags\">${incHtml}</div>` : ''}\n</div>\n\n<!-- PAYMENT CARDS -->\n<div class=\"pgrid\">\n  ${pc(`${leaseTerm1}mo Lease \u00b7 ${lc1?lc1.rt+'%':'STD'} APR`, 'lease', makeLeaseRows(lc1, leaseTerm1),\n    lc1 ? `Res: ${ca$(lc1.res.val)} (${(lc1.res.pct*100).toFixed(1)}%) \u00b7 ${lc1.res.confirmed?'\u2713 Confirmed':'Est.'} \u00b7 ${kmAllowance.toLocaleString()} km/yr` : 'STD rate')}\n  ${pc(`${leaseTerm2}mo Lease \u00b7 ${lc2?lc2.rt+'%':'STD'} APR`, 'lease', makeLeaseRows(lc2, leaseTerm2),\n    lc2 ? `Res: ${ca$(lc2.res.val)} (${(lc2.res.pct*100).toFixed(1)}%) \u00b7 ${lc2.res.confirmed?'\u2713 Confirmed':'Est.'} \u00b7 ${kmAllowance.toLocaleString()} km/yr` : 'STD rate')}\n  ${pc(`${finTerm1}mo Finance \u00b7 ${fc1p?fc1p.rt+'%':'STD'} APR`, 'finance', makeFinRows(fc1p, finTerm1))}\n  ${pc(`${finTerm2}mo Finance \u00b7 ${fc2p?fc2p.rt+'%':'STD'} APR`, 'finance', makeFinRows(fc2p, finTerm2))}\n</div>\n\n<!-- OPTIONS -->\n${addons || warrantySelected ? `\n<div class=\"opts-row\">\n  <span class=\"lbl\">Add-ons:</span>\n  ${addons ? `<span>${addons}</span>` : ''}\n  ${warrantySelected ? `<span style=\"color:#1a7a45;font-weight:600\">\ud83d\udee1 Warranty: ${warrantySelected.label} \u00b7 $${warrantySelected.cost.toLocaleString()}</span>` : ''}\n</div>` : ''}\n\n<!-- DISCLAIMER -->\n<div class=\"disc\">\n  <b>\u26a0 Quick Quote \u2014 For Reference Only.</b>\n  Prices from Maple Honda internal sheet (${DATA_DATE}). Selling Price = MSRP + Freight/PDI + Dealer Fee + Gov Fees, before HST.\n  Lease rates & residuals are <b>estimates</b> \u2014 verify monthly with HFS at honda.ca before quoting.\n  GAP Insurance adds $${gapAmt.toLocaleString()} to financed amount. All payments before HST.\n  ${warrantySelected ? `Honda Plus Warranty ($${warrantySelected.cost.toLocaleString()}) added to financed principal. Dealer may sell for less. ` : ''}\n  For accurate rates & residuals: <b>honda.ca/en/buildyourhonda</b>\n</div>\n\n<script>window.onload=function(){window.print();}<\\/script>\n</body></html>`;\n\n  const w = window.open('', '_blank', 'width=1100,height=750');\n  w.document.write(html);\n  w.document.close();\n}\n\nfunction copyQ() {\n  const cap  = r.price - downPayment;\n  const res36 = r.price * r.rv36;\n  const res60 = r.rv60 ? r.price * r.rv60 : null;\n  const l36 = lmo(cap, res36, 36, r.lr36);\n  const l60 = (r.lr60 && res60!==null) ? lmo(cap, res60, 60, r.lr60) : null;\n  const f60 = fmo(cap, 60, r.fr60);\n  const f84 = fmo(cap, 84, r.fr84);\n  const f60g = fmo(cap+gapAmt,60,r.fr60);\n  const f84g = fmo(cap+gapAmt,84,r.fr84);\n  const ob = optBW(), om = bw2mo(ob);\n\n  const lines = [\n    `${m.name} ${m.trim} \u2014 Quick Quote`,\n    `Data pulled: ${DATA_DATE} \u00b7 FOR REFERENCE ONLY`,\n    `Verify rates/residuals at honda.ca`,\n    ``,\n    `MSRP: ${ca$(m.msrp)} \u00b7 Selling Price: ${ca$(r.price)} \u00b7 OTD (incl HST): ${ca$(m.otd)}`,\n    `KM Allowance: ${kmAllowance.toLocaleString()}/yr`,\n    downPayment > 0 ? `Down Payment: ${ca$(downPayment)} \u2192 Adj. Cap/Principal: ${ca$(cap)}` : '',\n    ``,\n    `\u2500\u2500 LEASE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500`,\n    `3 Year / ${r.lr36}% APR${m.promo&&m.promo.term===36?' (HFS Promo)':' (est. buy rate)'}`,\n    `  Monthly: ${ca$c(l36+om)}/mo  \u00b7  Bi-Weekly: ${ca$c(mo2bw(l36)+ob)}/2wk`,\n    `  Residual: ${ca$(res36)} (${Math.round(r.rv36*100)}% \u2014 estimate)`,\n    ``,\n    l60 ? `5 Year / ${r.lr60}% APR${m.promo&&m.promo.term===60?' (HFS Promo)':''}` : `5 Year: N/A`,\n    l60 ? `  Monthly: ${ca$c(l60+om)}/mo  \u00b7  Bi-Weekly: ${ca$c(mo2bw(l60)+ob)}/2wk` : '',\n    l60 ? `  Residual: ${ca$(res60)} (${Math.round(r.rv60*100)}% \u2014 estimate)` : '',\n    ``,\n    `\u2500\u2500 FINANCE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500`,\n    `5 Year / ${r.fr60}% APR`,\n    `  Monthly: ${ca$c(f60)}/mo  \u00b7  Bi-Weekly: ${ca$c(fbw(cap,60,r.fr60))}/2wk`,\n    `  + GAP Insurance ($${gapAmt.toLocaleString()}): ${ca$c(f60g)}/mo  \u00b7  ${ca$c(fbw(cap+gapAmt,60,r.fr60))}/2wk`,\n    ``,\n    `7 Year / ${r.fr84}% APR`,\n    `  Monthly: ${ca$c(f84)}/mo  \u00b7  Bi-Weekly: ${ca$c(fbw(cap,84,r.fr84))}/2wk`,\n    `  + GAP Insurance ($${gapAmt.toLocaleString()}): ${ca$c(f84g)}/mo  \u00b7  ${ca$c(fbw(cap+gapAmt,84,r.fr84))}/2wk`,\n    ob > 0 ? `\\nOptions included: +${ca$c(ob)}/2wk \u00b7 +${ca$c(om)}/mo` : '',\n    m.inc ? `\\nIncentives: ${m.inc.join(' \u00b7 ')}` : '',\n    `\\n*All payments before HST. Rates & residuals are estimates.*`,\n  ].filter(l => l !== undefined && l !== '');\n\n  navigator.clipboard.writeText(lines.join('\\n'))\n    .then(() => showToast('Quote copied to clipboard!'));\n}\n\nfunction showToast(msg) {\n  const t = document.getElementById('toast');\n  t.textContent = msg;\n  t.classList.add('show');\n  setTimeout(() => t.classList.remove('show'), 2200);\n}\n\ndocument.addEventListener('keydown', e => {\n  if ((e.ctrlKey||e.metaKey) && e.key === 'e') { e.preventDefault(); if (cur) togglePanel(); }\n});\n<\/script>\n</body>\n</html>\n";
const CMP_TEMPLATE = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"robots\" content=\"noindex,nofollow,noarchive\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Compare \u2014 Honda Quick Quote</title>\n<script>if(typeof sessionStorage!=='undefined'&&sessionStorage.getItem('mh_qt_auth')!=='1'){window.location.replace('quote.html');}<\/script>\n<style>\n:root{\n  --red:#E40521;--bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#222;\n  --border:#272727;--border2:#333;--text:#f0f0f0;--dim:#777;--muted:#3a3a3a;\n  --blue:#4a9eff;--green:#00d47a;--yellow:#f5a623;--purple:#a87cf5;\n}\n*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}\nbody{font-family:'Segoe UI',system-ui,sans-serif;font-size:15px;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}\n::-webkit-scrollbar{width:4px;height:4px;}\n::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}\n\n/* \u2500\u2500 HEADER \u2500\u2500 */\n.hdr{background:var(--s1);border-bottom:1px solid var(--border);height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}\n.hdr-brand{display:flex;align-items:center;gap:10px;}\n.logo{width:30px;height:30px;background:var(--red);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;}\n.hdr-title{font-size:15px;font-weight:700;}\n.hdr-sub{font-size:11px;color:var(--dim);}\n.hdr-nav{display:flex;gap:8px;}\n.btn{background:none;border:1px solid var(--border2);color:var(--dim);padding:6px 13px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .13s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}\n.btn:hover{border-color:var(--text);color:var(--text);}\n.btn-print{border-color:var(--border2);}\n.btn-print:hover{border-color:var(--green);color:var(--green);}\n.btn-clear{border-color:rgba(228,5,33,.3);color:#ff7070;}\n.btn-clear:hover{border-color:var(--red);}\n\n/* \u2500\u2500 SLOT PICKER \u2500\u2500 */\n.picker-bar{background:var(--s1);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}\n.picker-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);flex-shrink:0;}\n.slots{display:flex;gap:10px;flex-wrap:wrap;flex:1;}\n.slot{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:200px;cursor:pointer;transition:all .15s;position:relative;}\n.slot:hover{border-color:var(--border2);}\n.slot.active{border-color:var(--red);background:rgba(228,5,33,.06);}\n.slot.filled{border-color:var(--border2);}\n.slot-num{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}\n.slot-name{font-size:13px;font-weight:600;color:var(--text);}\n.slot-price{font-size:11px;color:var(--dim);margin-top:2px;}\n.slot-clear{position:absolute;top:6px;right:8px;font-size:14px;color:var(--muted);cursor:pointer;line-height:1;}\n.slot-clear:hover{color:#ff7070;}\n.slot.empty .slot-name{color:var(--muted);}\n\n/* \u2500\u2500 MODEL PICKER MODAL \u2500\u2500 */\n.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;}\n.modal{background:var(--s1);border:1px solid var(--border2);border-radius:12px;width:520px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;}\n.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}\n.modal-title{font-size:15px;font-weight:700;}\n.modal-close{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}\n.modal-search{padding:10px 14px;border-bottom:1px solid var(--border);}\n.modal-search input{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px;font-family:inherit;outline:none;}\n.modal-search input:focus{border-color:var(--red);}\n.modal-list{overflow-y:auto;flex:1;}\n.modal-cat{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:10px 16px 4px;}\n.modal-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}\n.modal-item:hover{background:var(--s2);}\n.modal-item-name{font-size:13px;font-weight:500;}\n.modal-item-trim{font-size:11px;color:var(--dim);margin-top:1px;}\n.modal-item-price{font-size:13px;font-weight:600;color:var(--text);}\n\n/* \u2500\u2500 COMPARE TABLE \u2500\u2500 */\n.compare-wrap{flex:1;overflow-x:auto;padding:20px;}\n.compare-table{border-collapse:collapse;width:100%;min-width:640px;}\n\n/* Row types */\n.ct-section td{background:var(--s2);padding:8px 14px;font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);border-top:2px solid var(--border2);}\n.ct-row td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:top;}\n.ct-row:hover td{background:rgba(255,255,255,.02);}\n.ct-label{font-size:13px;color:var(--dim);width:160px;}\n.ct-val{font-size:15px;font-weight:600;text-align:center;}\n.ct-val.big{font-size:22px;font-weight:800;letter-spacing:-.5px;}\n.ct-val.dim{color:var(--dim);font-size:13px;font-weight:400;}\n.ct-val.green{color:var(--green);}\n.ct-val.blue{color:var(--blue);}\n.ct-val.red{color:#ff7070;}\n.ct-val.yellow{color:var(--yellow);}\n.ct-val.best{background:rgba(0,212,122,.08);border-radius:5px;}\n\n/* Header row */\n.ct-hdr td{padding:12px 14px;background:var(--s1);border-bottom:2px solid var(--border);text-align:center;font-weight:700;font-size:13px;position:sticky;top:0;z-index:5;}\n.ct-hdr td:first-child{text-align:left;color:var(--dim);font-size:11px;letter-spacing:.5px;text-transform:uppercase;}\n\n/* Term selectors */\n.term-sel{background:var(--s3);border:1px solid rgba(74,158,255,.3);color:var(--blue);padding:4px 7px;border-radius:5px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;outline:none;width:100%;margin-bottom:6px;}\n.term-sel.fin{border-color:rgba(0,212,122,.3);color:var(--green);}\n\n/* Empty state */\n.ct-empty{text-align:center;padding:60px;color:var(--muted);}\n.ct-empty-icon{font-size:40px;margin-bottom:12px;}\n\n/* PRINT */\n@media print{\n  .hdr,.picker-bar,.hdr-nav,.modal-overlay{display:none!important;}\n  .compare-wrap{padding:10px;}\n  body{background:#fff;color:#111;}\n  .ct-section td{background:#f5f5f5;color:#555;border-top:2px solid #ddd;}\n  .ct-row td{border-bottom:1px solid #ddd;}\n  .ct-hdr td{background:#f0f0f0;border-bottom:2px solid #ddd;}\n  .ct-val.big{font-size:18px;}\n  @page{margin:12mm;size:landscape;}\n}\n</style>\n</head>\n<body>\n\n<div class=\"hdr\">\n  <div class=\"hdr-brand\">\n    <div class=\"logo\">H</div>\n    <div>\n      <div class=\"hdr-title\">Quick Compare</div>\n      <div class=\"hdr-sub\">Maple Honda \u00b7 Compare up to 3 models</div>\n    </div>\n  </div>\n  <div class=\"hdr-nav\">\n    <button class=\"btn btn-clear\" onclick=\"clearAll()\">\u2715 Clear All</button>\n    <button class=\"btn btn-print\" onclick=\"window.print()\">\ud83d\udda8 Print Comparison</button>\n    <a class=\"btn\" href=\"qt.html\">\u2190 Full Tool</a>\n  </div>\n</div>\n\n<!-- SLOT PICKER -->\n<div class=\"picker-bar\">\n  <span class=\"picker-label\">Compare:</span>\n  <div class=\"slots\" id=\"slots\"></div>\n  <div style=\"font-size:11px;color:var(--muted);margin-left:auto\">Apr 25, 2026 \u00b7 \u26a0 Estimates only</div>\n</div>\n\n<!-- MODEL PICKER MODAL -->\n<div class=\"modal-overlay\" id=\"modal\" style=\"display:none\" onclick=\"if(event.target===this)closeModal()\">\n  <div class=\"modal\">\n    <div class=\"modal-hdr\">\n      <div class=\"modal-title\">Select Model</div>\n      <button class=\"modal-close\" onclick=\"closeModal()\">\u2715</button>\n    </div>\n    <div class=\"modal-search\"><input id=\"search\" placeholder=\"Search model or trim...\" oninput=\"filterModels(this.value)\"></div>\n    <div class=\"modal-list\" id=\"modal-list\"></div>\n  </div>\n</div>\n\n<!-- COMPARE TABLE -->\n<div class=\"compare-wrap\">\n  <div id=\"compare-out\">\n    <div class=\"ct-empty\">\n      <div class=\"ct-empty-icon\">\u2696\ufe0f</div>\n      <div style=\"font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px\">Select models to compare</div>\n      <div>Click a slot above to pick up to 3 Honda models</div>\n    </div>\n  </div>\n</div>\n\n<div style=\"text-align:center;padding:10px;font-size:11px;color:var(--muted);\">\n  \ud83d\udee0 Tech Support: <a href=\"tel:6475236878\" style=\"color:var(--dim);text-decoration:none;\">647-523-6878</a>\n</div>\n\n<script>\n// \u2500\u2500 MODEL DATA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst M = [/*%%MARRAY%%*/];\n// \u2500\u2500 CALC \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction lmo(c,r,mo,rt){const mf=rt/2400;return(c-r)/mo+(c+r)*mf;}\nfunction fmo(p,mo,rt){if(!rt)return null;const r=rt/100/12;return p*r*Math.pow(1+r,mo)/(Math.pow(1+r,mo)-1);}\nfunction fbw(p,mo,rt){if(!rt)return null;const r=rt/100/26,n=Math.round(mo*26/12);return p*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);}\nconst mo2bw=m=>m*12/26;\nconst ca$=n=>'$'+Math.round(n).toLocaleString('en-CA');\nconst ca$c=n=>'$'+n.toFixed(0).replace(/\\B(?=(\\d{3})+(?!\\d))/g,',');\n\n// \u2500\u2500 STATE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nlet slots = [null, null, null]; // up to 3 models\nlet activeSlot = 0;\nlet leaseTerm = 24, finTerm = 60, downPayment = 0;\nconst LEASE_TERMS = [24,30,36,42,48,54,60];\nconst FIN_TERMS   = [24,36,48,60,72,84,96];\n\n// \u2500\u2500 SLOTS UI \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderSlots() {\n  document.getElementById('slots').innerHTML = [0,1,2].map(i => {\n    const m = slots[i];\n    if (!m) return `\n      <div class=\"slot empty ${activeSlot===i?'active':''}\" onclick=\"openModal(${i})\">\n        <div class=\"slot-num\">Vehicle ${i+1}</div>\n        <div class=\"slot-name\">+ Add model</div>\n      </div>`;\n    return `\n      <div class=\"slot filled ${activeSlot===i?'active':''}\" onclick=\"openModal(${i})\">\n        <span class=\"slot-clear\" onclick=\"event.stopPropagation();removeSlot(${i})\">\u2715</span>\n        <div class=\"slot-num\">Vehicle ${i+1}</div>\n        <div class=\"slot-name\">2026 ${m.name}</div>\n        <div class=\"slot-price\">${m.trim} \u00b7 ${ca$(m.price)}</div>\n      </div>`;\n  }).join('');\n}\n\n// \u2500\u2500 MODAL \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction openModal(slotIdx) {\n  activeSlot = slotIdx;\n  renderSlots();\n  document.getElementById('modal').style.display = 'flex';\n  document.getElementById('search').value = '';\n  filterModels('');\n  setTimeout(() => document.getElementById('search').focus(), 100);\n}\n\nfunction closeModal() {\n  document.getElementById('modal').style.display = 'none';\n}\n\nfunction filterModels(q) {\n  const cats = [...new Set(M.map(m=>m.cat))];\n  const lq = q.toLowerCase();\n  document.getElementById('modal-list').innerHTML = cats.map(cat => {\n    const items = M.filter(m => m.cat===cat && (\n      !lq || m.name.toLowerCase().includes(lq) || m.trim.toLowerCase().includes(lq)\n    ));\n    if (!items.length) return '';\n    return `<div class=\"modal-cat\">${cat}</div>` +\n      items.map(m => `\n        <div class=\"modal-item\" onclick=\"selectModel('${m.id}')\">\n          <div>\n            <div class=\"modal-item-name\">2026 ${m.name} ${m.trim}</div>\n            <div class=\"modal-item-trim\">${m.engine} \u00b7 ${m.drive}</div>\n          </div>\n          <div class=\"modal-item-price\">${ca$(m.price)}</div>\n        </div>`).join('');\n  }).join('');\n}\n\nfunction selectModel(id) {\n  slots[activeSlot] = M.find(m=>m.id===id);\n  closeModal();\n  renderSlots();\n  renderCompare();\n}\n\nfunction removeSlot(i) {\n  slots[i] = null;\n  renderSlots();\n  renderCompare();\n}\n\nfunction clearAll() {\n  slots = [null,null,null];\n  renderSlots();\n  renderCompare();\n}\n\n// \u2500\u2500 COMPARE TABLE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction renderCompare() {\n  const active = slots.filter(Boolean);\n  if (!active.length) {\n    document.getElementById('compare-out').innerHTML = `\n      <div class=\"ct-empty\">\n        <div class=\"ct-empty-icon\">\u2696\ufe0f</div>\n        <div style=\"font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px\">Select models to compare</div>\n        <div>Click a slot above to pick up to 3 Honda models</div>\n      </div>`;\n    return;\n  }\n\n  const cap = m => m.price - downPayment;\n\n  // Lease calcs\n  const lrt  = m => leaseTerm <= 36 ? m.lr[36] : m.lr[60];\n  const lrvp  = m => leaseTerm <= 36 ? m.rv[36] : m.rv[60];\n  const lres  = m => Math.round(m.msrp * lrvp(m));\n  const lbw   = m => { const rt=lrt(m); if(!rt)return null; return mo2bw(lmo(cap(m),lres(m),leaseTerm,rt)); };\n  const lmop  = m => { const rt=lrt(m); if(!rt)return null; return lmo(cap(m),lres(m),leaseTerm,rt); };\n\n  // Finance calcs\n  const frt   = m => finTerm <= 60 ? m.fr[60] : m.fr[84];\n  const fbwv  = m => { const rt=frt(m); if(!rt)return null; return fbw(cap(m),finTerm,rt); };\n  const fmov  = m => { const rt=frt(m); if(!rt)return null; return fmo(cap(m),finTerm,rt); };\n\n  // Highlight best (lowest) value\n  const best = (arr, fn) => {\n    const vals = arr.map(fn).map(v=>v!=null?parseFloat(v.replace(/[^0-9.]/g,'')):Infinity);\n    const min = Math.min(...vals);\n    return arr.map((_,i) => vals[i]===min && min !== Infinity);\n  };\n\n  const nCols = active.length;\n  const colW  = `${Math.floor(85/nCols)}%`;\n\n  // Down payment options\n  const dpOpts = [0,500,1000,2000,5000].map(v =>\n    `<option value=\"${v}\" ${downPayment===v?'selected':''}>${v===0?'$0 Down':'$'+v.toLocaleString()}</option>`\n  ).join('');\n\n  const bestLbw = best(active, m => { const v=lbw(m); return v ? ca$c(v) : 'Z'; });\n  const bestFbw = best(active, m => { const v=fbwv(m); return v ? ca$c(v) : 'Z'; });\n\n  function valCell(val, isBest, color='') {\n    const cls = ['ct-val', 'big', color, isBest?'best':''].filter(Boolean).join(' ');\n    return `<td class=\"${cls}\">${val || '<span style=\"color:var(--muted);font-size:13px\">STD</span>'}</td>`;\n  }\n\n  document.getElementById('compare-out').innerHTML = `\n    <table class=\"compare-table\">\n      <!-- HEADER -->\n      <tr class=\"ct-hdr\">\n        <td>\n          <div style=\"margin-bottom:6px\">Down:\n            <select onchange=\"downPayment=parseInt(this.value);renderCompare()\"\n              style=\"background:var(--s2);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:4px;font-size:12px;font-family:inherit;outline:none;margin-left:4px\">\n              ${dpOpts}\n            </select>\n          </div>\n        </td>\n        ${active.map((m,i) => `\n          <td>\n            <div style=\"font-size:15px;font-weight:800;letter-spacing:-.3px\">2026 ${m.name}</div>\n            <div style=\"font-size:12px;color:var(--dim);margin-top:2px\">${m.trim}</div>\n          </td>`).join('')}\n      </tr>\n\n      <!-- PRICING -->\n      <tr class=\"ct-section\"><td colspan=\"${nCols+1}\">Pricing</td></tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">MSRP</td>\n        ${active.map(m=>`<td class=\"ct-val dim\">${ca$(m.msrp)}</td>`).join('')}\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Selling Price (Before Tax)</td>\n        ${active.map((m,i)=>{\n          const isLow = best(active, x=>ca$(x.price))[i];\n          return `<td class=\"ct-val ${isLow?'best green':''}\" style=\"font-size:17px;font-weight:700\">${ca$(m.price)}</td>`;\n        }).join('')}\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">OTD (incl 13% HST)</td>\n        ${active.map(m=>`<td class=\"ct-val dim\">${ca$(m.otd)}</td>`).join('')}\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Engine \u00b7 Drive</td>\n        ${active.map(m=>`<td class=\"ct-val dim\" style=\"font-size:12px\">${m.engine}<br>${m.drive}</td>`).join('')}\n      </tr>\n\n      <!-- LEASE -->\n      <tr class=\"ct-section\">\n        <td colspan=\"${nCols+1}\" style=\"display:flex;align-items:center;gap:10px;\">\n          Lease\n          <select class=\"term-sel\" onchange=\"leaseTerm=parseInt(this.value);renderCompare()\"\n            style=\"width:auto;display:inline-block\">\n            ${LEASE_TERMS.map(t=>`<option value=\"${t}\" ${t===leaseTerm?'selected':''}>${t} months</option>`).join('')}\n          </select>\n        </td>\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Rate</td>\n        ${active.map(m=>{const rt=lrt(m);return`<td class=\"ct-val blue\" style=\"font-size:14px\">${rt?rt+'% APR':'STD'}</td>`;}).join('')}\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Bi-Weekly</td>\n        ${active.map((m,i)=>valCell(lbw(m)?ca$c(lbw(m)):null, bestLbw[i], 'blue')).join('')}\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Monthly</td>\n        ${active.map(m=>`<td class=\"ct-val dim\">${lmop(m)?ca$c(lmop(m)):'STD'}</td>`).join('')}\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Est. Residual</td>\n        ${active.map(m=>`<td class=\"ct-val dim\" style=\"font-size:12px\">${ca$(lres(m))} (${(lrvp(m)*100).toFixed(0)}%) \u26a0est</td>`).join('')}\n      </tr>\n\n      <!-- FINANCE -->\n      <tr class=\"ct-section\">\n        <td colspan=\"${nCols+1}\" style=\"display:flex;align-items:center;gap:10px;\">\n          Finance\n          <select class=\"term-sel fin\" onchange=\"finTerm=parseInt(this.value);renderCompare()\"\n            style=\"width:auto;display:inline-block\">\n            ${FIN_TERMS.map(t=>`<option value=\"${t}\" ${t===finTerm?'selected':''}>${t} months</option>`).join('')}\n          </select>\n        </td>\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Rate</td>\n        ${active.map(m=>{const rt=frt(m);return`<td class=\"ct-val green\" style=\"font-size:14px\">${rt?rt+'% APR':'STD'}</td>`;}).join('')}\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Bi-Weekly</td>\n        ${active.map((m,i)=>valCell(fbwv(m)?ca$c(fbwv(m)):null, bestFbw[i], 'green')).join('')}\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Monthly</td>\n        ${active.map(m=>`<td class=\"ct-val dim\">${fmov(m)?ca$c(fmov(m)):'STD'}</td>`).join('')}\n      </tr>\n      <tr class=\"ct-row\">\n        <td class=\"ct-label\">Total Payments (est)</td>\n        ${active.map(m=>{\n          const mo=fmov(m);\n          return`<td class=\"ct-val dim\" style=\"font-size:12px\">${mo?ca$(mo*finTerm):'\u2014'}</td>`;\n        }).join('')}\n      </tr>\n    </table>\n    <div style=\"font-size:11px;color:var(--muted);padding:10px 0;text-align:right\">\n      \u2705 Highlighted = lowest value \u00b7 \u26a0 Residuals estimated \u00b7 $0 down unless changed \u00b7 before HST\n    </div>`;\n}\n\n// \u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nrenderSlots();\nrenderCompare();\nfilterModels('');\n<\/script>\n</body>\n</html>\n";
const MOB_TEMPLATE = "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n<meta name=\"robots\" content=\"noindex,nofollow,noarchive\">\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\">\n<meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\">\n<title>Honda Quick Ref</title>\n<script>\nif(typeof sessionStorage!=='undefined'&&sessionStorage.getItem('mh_qt_auth')!=='1'){\n  window.location.replace('quote.html');\n}\n<\/script>\n<style>\n:root{\n  --red:#E40521; --bg:#0a0a0a; --s1:#111; --s2:#181818; --s3:#222;\n  --border:#272727; --text:#f0f0f0; --dim:#888; --muted:#3a3a3a;\n  --blue:#4a9eff; --green:#00d47a; --yellow:#f5a623;\n}\n*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}\nhtml,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);}\nbody{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:15px;}\n\n/* \u2500\u2500 HEADER \u2500\u2500 */\n.hdr{\n  background:var(--s1);\n  border-bottom:1px solid var(--border);\n  padding:12px 16px;\n  display:flex; align-items:center; justify-content:space-between;\n  position:sticky; top:0; z-index:50;\n}\n.hdr-brand{display:flex;align-items:center;gap:10px;}\n.logo{width:30px;height:30px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;}\n.hdr-title{font-size:15px;font-weight:700;}\n.hdr-sub{font-size:11px;color:var(--dim);}\n.hdr-right{text-align:right;}\n.data-date{font-size:10px;color:var(--muted);}\n\n/* \u2500\u2500 LAYOUT \u2500\u2500 */\n.layout{display:flex;height:calc(100vh - 57px);overflow:hidden;}\n\n/* \u2500\u2500 SIDEBAR \u2500\u2500 */\n.sb{\n  width:155px; flex-shrink:0;\n  background:var(--s1);\n  border-right:1px solid var(--border);\n  overflow-y:auto; overflow-x:hidden;\n  -webkit-overflow-scrolling:touch;\n}\n.sb::-webkit-scrollbar{display:none;}\n.sb-cat{\n  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;\n  color:var(--muted); padding:10px 12px 4px;\n}\n.sb-item{\n  padding:9px 12px;\n  cursor:pointer;\n  border-left:3px solid transparent;\n  transition:background .1s;\n}\n.sb-item:active{background:var(--s2);}\n.sb-item.active{background:rgba(228,5,33,.1);border-left-color:var(--red);}\n.sb-name{font-size:13px;font-weight:500;line-height:1.2;color:var(--text);}\n.sb-trim{font-size:11px;color:var(--dim);margin-top:2px;}\n.sb-price{font-size:11px;font-weight:600;color:var(--text);margin-top:2px;}\n\n/* \u2500\u2500 MAIN \u2500\u2500 */\n.main{\n  flex:1; overflow-y:auto; overflow-x:hidden;\n  -webkit-overflow-scrolling:touch;\n  padding:14px;\n}\n.main::-webkit-scrollbar{display:none;}\n\n/* \u2500\u2500 WELCOME \u2500\u2500 */\n.welcome{\n  padding:40px 20px;\n  text-align:center;\n  color:var(--dim);\n}\n.welcome-icon{font-size:48px;margin-bottom:12px;}\n.welcome-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}\n.welcome-sub{font-size:13px;line-height:1.6;}\n\n/* \u2500\u2500 VEHICLE HEADER \u2500\u2500 */\n.veh-hdr{margin-bottom:14px;}\n.veh-name{font-size:20px;font-weight:800;letter-spacing:-.4px;line-height:1.2;}\n.veh-trim{color:var(--dim);font-weight:400;}\n.veh-meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;}\n.veh-chip{\n  font-size:11px;background:var(--s2);border:1px solid var(--border);\n  padding:3px 8px;border-radius:4px;color:var(--dim);\n}\n.veh-chip.price{color:var(--text);font-weight:700;font-size:13px;background:rgba(228,5,33,.1);border-color:rgba(228,5,33,.25);}\n.veh-chip.otd{color:var(--dim);}\n\n/* \u2500\u2500 SECTION LABEL \u2500\u2500 */\n.sec{\n  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;\n  color:var(--dim);margin:14px 0 8px;\n  display:flex;align-items:center;gap:8px;\n}\n.sec::after{content:'';flex:1;height:1px;background:var(--border);}\n\n/* \u2500\u2500 PAYMENT TABLE \u2500\u2500 */\n.pay-table{\n  background:var(--s1);\n  border:1px solid var(--border);\n  border-radius:10px;\n  overflow:hidden;\n  margin-bottom:4px;\n}\n.pay-table-hdr{\n  display:grid; grid-template-columns:50px 1fr 1fr 1fr;\n  background:var(--s2);\n  border-bottom:1px solid var(--border);\n  padding:7px 10px;\n}\n.pay-table-hdr span{\n  font-size:10px;font-weight:700;letter-spacing:.5px;\n  text-transform:uppercase;color:var(--dim);\n  text-align:right;\n}\n.pay-table-hdr span:first-child{text-align:left;}\n.pay-row{\n  display:grid; grid-template-columns:50px 1fr 1fr 1fr;\n  padding:9px 10px;\n  border-bottom:1px solid var(--border);\n  align-items:center;\n}\n.pay-row:last-child{border:none;}\n.pay-row:active{background:var(--s2);}\n.pay-mo{font-size:13px;font-weight:700;color:var(--text);}\n.pay-rate{font-size:10px;color:var(--muted);margin-top:1px;}\n.pay-amt{\n  font-size:15px;font-weight:700;text-align:right;\n}\n.pay-amt.bw{color:var(--text);}\n.pay-amt.mo{color:var(--dim);font-size:13px;font-weight:500;}\n.pay-amt.na{color:var(--muted);font-size:12px;font-weight:400;}\n\n/* \u2500\u2500 RESIDUAL BADGE \u2500\u2500 */\n.res-line{\n  font-size:11px;color:var(--blue);margin-top:3px;text-align:right;\n}\n\n/* \u2500\u2500 DISCLAIMER \u2500\u2500 */\n.disc{\n  margin-top:16px;padding:10px 12px;\n  background:rgba(245,166,35,.05);\n  border:1px solid rgba(245,166,35,.12);\n  border-radius:8px;\n  font-size:11px;color:var(--dim);line-height:1.6;\n}\n\n/* \u2500\u2500 DESKTOP NOTICE (shows on desktop) \u2500\u2500 */\n.desktop-notice{\n  display:none;\n  position:fixed;bottom:16px;right:16px;\n  background:var(--s2);border:1px solid var(--border);\n  padding:10px 14px;border-radius:8px;\n  font-size:12px;color:var(--dim);\n}\n@media(min-width:768px){.desktop-notice{display:block;}}\n</style>\n</head>\n<body>\n\n<div class=\"hdr\">\n  <div class=\"hdr-brand\">\n    <div class=\"logo\">H</div>\n    <div>\n      <div class=\"hdr-title\">Quick Ref</div>\n      <div class=\"hdr-sub\">Maple Honda</div>\n    </div>\n  </div>\n  <div class=\"hdr-right\">\n    <div class=\"data-date\">\ud83d\udcc5 Apr 25, 2026</div>\n    <div class=\"data-date\" style=\"color:var(--yellow)\">\u26a0 Estimate \u00b7 No down</div>\n  </div>\n</div>\n\n<div class=\"layout\">\n  <div class=\"sb\" id=\"sb\"></div>\n  <div class=\"main\" id=\"main\">\n    <div class=\"welcome\">\n      <div class=\"welcome-icon\">\ud83d\ude97</div>\n      <div class=\"welcome-title\">Honda Quick Reference</div>\n      <div class=\"welcome-sub\">Tap any model for instant<br>payment overview \u2014 all terms</div>\n    </div>\n  </div>\n</div>\n\n<div class=\"desktop-notice\">\n  For full features open on desktop \u2192<br>\n  <a href=\"qt.html\" style=\"color:var(--blue)\">Switch to Full Tool</a>\n</div>\n\n<script>\n// \u2500\u2500 DATA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst M = [/*%%MARRAY%%*/];\n// \u2500\u2500 CALCULATORS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction lmo(cap,res,mo,rate){\n  const mf=rate/2400;\n  return (cap-res)/mo+(cap+res)*mf;\n}\nfunction fmo(p,mo,rate){\n  if(!rate)return p/mo;\n  const r=rate/100/12;\n  return p*r*Math.pow(1+r,mo)/(Math.pow(1+r,mo)-1);\n}\nfunction fbw(p,mo,rate){\n  if(!rate)return p/(mo*26/12);\n  const r=rate/100/26,n=Math.round(mo*26/12);\n  return p*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);\n}\nconst mo2bw=m=>m*12/26;\nconst ca$=n=>'$'+Math.round(n).toLocaleString('en-CA');\nconst ca$c=n=>'$'+n.toFixed(0).replace(/\\B(?=(\\d{3})+(?!\\d))/g,',');\n\n// Lease terms with rate source: 24/30 use 36mo rate, 42/48/54 use 60mo rate\nfunction lrForTerm(m,mo){\n  if(mo<=36)return m.lr[36];\n  return m.lr[60];\n}\n// Finance terms: \u226460 use fr60, >60 use fr84\nfunction frForTerm(m,mo){\n  if(mo<=60)return m.fr[60];\n  return m.fr[84];\n}\n// Residual: use 36 pct for \u226436mo, 60 pct for >36mo\nfunction resForTerm(m,mo){\n  const pct = mo<=36 ? m.rv[36] : m.rv[60];\n  return Math.round(m.msrp * pct);\n}\n\n// \u2500\u2500 SIDEBAR \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n(function buildSb(){\n  const cats=[...new Set(M.map(m=>m.cat))];\n  document.getElementById('sb').innerHTML=cats.map(cat=>`\n    <div class=\"sb-cat\">${cat}</div>\n    ${M.filter(m=>m.cat===cat).map(m=>`\n      <div class=\"sb-item\" id=\"si-${m.id}\" onclick=\"pick('${m.id}')\">\n        <div class=\"sb-name\">${m.name}</div>\n        <div class=\"sb-trim\">${m.trim}</div>\n        <div class=\"sb-price\">${ca$(m.price)}</div>\n      </div>\n    `).join('')}\n  `).join('');\n})();\n\n// \u2500\u2500 RENDER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction pick(id){\n  const m=M.find(x=>x.id===id);\n  if(!m)return;\n  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));\n  document.getElementById('si-'+id)?.classList.add('active');\n\n  const cap=m.price; // no down payment in quick ref\n\n  // Lease rows: 24/30/36/42/48/54/60\n  const leaseTerms=[24,30,36,42,48,54,60];\n  const leaseRows=leaseTerms.map(mo=>{\n    const rt=lrForTerm(m,mo);\n    if(!rt)return {mo,na:true};\n    const res=resForTerm(m,mo);\n    const bw=mo2bw(lmo(cap,res,mo,rt));\n    const mo_p=lmo(cap,res,mo,rt);\n    return {mo,rt,bw,mo_p,res};\n  });\n\n  // Finance rows: 24/36/48/60/72/84/96\n  const finTerms=[24,36,48,60,72,84,96];\n  const finRows=finTerms.map(mo=>{\n    const rt=frForTerm(m,mo);\n    if(!rt)return {mo,na:true};\n    const bw=fbw(cap,mo,rt);\n    const mo_p=fmo(cap,mo,rt);\n    return {mo,rt,bw,mo_p};\n  });\n\n  document.getElementById('main').innerHTML=`\n    <div class=\"veh-hdr\">\n      <div class=\"veh-name\">2026 ${m.name} <span class=\"veh-trim\">${m.trim}</span></div>\n      <div class=\"veh-meta\">\n        <span class=\"veh-chip price\">${ca$(m.price)} before tax</span>\n        <span class=\"veh-chip otd\">OTD ${ca$(m.otd)}</span>\n        <span class=\"veh-chip\">MSRP ${ca$(m.msrp)}</span>\n        <span class=\"veh-chip\">${m.engine}</span>\n        <span class=\"veh-chip\">${m.drive}</span>\n      </div>\n    </div>\n\n    <div class=\"sec\" style=\"color:var(--blue)\">Lease \u00b7 ${ca$(cap)} cap \u00b7 est. residuals</div>\n    <div class=\"pay-table\">\n      <div class=\"pay-table-hdr\">\n        <span>Term</span>\n        <span>Rate</span>\n        <span>Bi-Wkly</span>\n        <span>Monthly</span>\n      </div>\n      ${leaseRows.map(r=>r.na?`\n        <div class=\"pay-row\">\n          <span class=\"pay-mo\">${r.mo}mo</span>\n          <span></span>\n          <span class=\"pay-amt na\" style=\"grid-column:3/5;text-align:right\">STD rate</span>\n        </div>\n      `:`\n        <div class=\"pay-row\">\n          <div>\n            <div class=\"pay-mo\">${r.mo}mo</div>\n          </div>\n          <div style=\"font-size:11px;color:var(--muted);text-align:right\">${r.rt}%</div>\n          <div class=\"pay-amt bw\" style=\"text-align:right\">${ca$c(r.bw)}</div>\n          <div class=\"pay-amt mo\" style=\"text-align:right\">${ca$c(r.mo_p)}</div>\n        </div>\n      `).join('')}\n    </div>\n    <div style=\"font-size:10px;color:var(--muted);margin-bottom:14px;text-align:right\">Residuals estimated \u2014 verify with HFS</div>\n\n    <div class=\"sec\" style=\"color:var(--green)\">Finance \u00b7 ${ca$(cap)} principal</div>\n    <div class=\"pay-table\">\n      <div class=\"pay-table-hdr\">\n        <span>Term</span>\n        <span>Rate</span>\n        <span>Bi-Wkly</span>\n        <span>Monthly</span>\n      </div>\n      ${finRows.map(r=>r.na?`\n        <div class=\"pay-row\">\n          <span class=\"pay-mo\">${r.mo}mo</span>\n          <span></span>\n          <span class=\"pay-amt na\" style=\"grid-column:3/5;text-align:right\">STD rate</span>\n        </div>\n      `:`\n        <div class=\"pay-row\">\n          <div class=\"pay-mo\">${r.mo}mo</div>\n          <div style=\"font-size:11px;color:var(--muted);text-align:right\">${r.rt}%</div>\n          <div class=\"pay-amt bw\" style=\"text-align:right\">${ca$c(r.bw)}</div>\n          <div class=\"pay-amt mo\" style=\"text-align:right\">${ca$c(r.mo_p)}</div>\n        </div>\n      `).join('')}\n    </div>\n\n    <div class=\"disc\">\n      \u26a0 Payments estimated \u00b7 $0 down \u00b7 before HST \u00b7 residuals are estimates.\n      For full quote tool: <a href=\"qt.html\" style=\"color:var(--blue)\">Open Desktop Tool \u2197</a>\n    </div>\n    <div style=\"text-align:center;padding:10px 0 4px;font-size:11px;color:var(--muted)\">\n      \ud83d\udee0 Tech Support: <a href=\"tel:6475236878\" style=\"color:var(--dim);text-decoration:none\">647-523-6878</a>\n    </div>\n  `;\n}\n<\/script>\n</body>\n</html>\n";

function exportFiles() {
  saveMeta();
  collectFromDOM();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(models));

  const yr = meta.year || 2026;

  const mArray = models.map(m => {
    const rv36 = (m.rv36 || 40) / 100;
    const rv60 = (m.rv60 || 35) / 100;
    const lr36 = m.lr36 != null ? m.lr36 : 'null';
    const lr60 = m.lr60 != null ? m.lr60 : 'null';
    const fr60 = m.fr60 != null ? m.fr60 : 'null';
    const fr84 = m.fr84 != null ? m.fr84 : 'null';
    const fr96 = m.fr96 != null ? m.fr96 : 6.69;
    return `{id:'${m.id}', cat:'${m.cat}', name:'${m.name}', trim:'${m.trim}',\n msrp:${m.msrp||0}, price:${m.price||0}, otd:${m.otd||0}, engine:'${m.engine||''}', drive:'${m.drive||'FWD'}',\n lr:{36:${lr36},60:${lr60}}, rv:{36:${rv36},60:${rv60}}, fr:{60:${fr60},84:${fr84},96:${fr96}}}`;
  }).join(',\n\n');

  const newMBlock = `const M = [\n// ══════════════════════════\n//  ${meta.period || yr}\n//  Updated: ${new Date().toLocaleDateString('en-CA')}\n// ══════════════════════════\n${mArray}\n]`;

  const qtHtml  = QT_TEMPLATE.replace('const M = [/*%%MARRAY%%*/]', newMBlock);
  const cmpHtml = CMP_TEMPLATE.replace('const M = [/*%%MARRAY%%*/]', newMBlock);
  const mobHtml = MOB_TEMPLATE.replace('const M = [/*%%MARRAY%%*/]', newMBlock);

  const files = [
    { name: 'qt.html',        content: qtHtml  },
    { name: 'compare.html',   content: cmpHtml },
    { name: 'qt-mobile.html', content: mobHtml },
  ];

  let count = 0;
  function dlNext() {
    if (count >= files.length) {
      showToast('✓ 3 files downloaded — drag to GitHub repo');
      return;
    }
    const f = files[count++];
    const blob = new Blob([f.content], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = f.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    setTimeout(dlNext, 500);
  }
  dlNext();
}

//  TOAST
// ══════════════════════════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Auto-save on any input change
document.addEventListener('input', e => {
  if (e.target.dataset.field) {
    // debounced background save
    clearTimeout(window._autoSaveTimer);
    window._autoSaveTimer = setTimeout(saveAll, 800);
  }
});
</script>
