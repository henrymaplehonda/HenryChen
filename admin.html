<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Admin — Honda Programs</title>
<style>
:root{
  --red:#E40521; --bg:#0a0a0a; --s1:#111; --s2:#181818; --s3:#222;
  --border:#2a2a2a; --border2:#333; --text:#f0f0f0; --dim:#777; --muted:#3a3a3a;
  --blue:#4a9eff; --green:#00d47a; --yellow:#f5a623; --purple:#a87cf5;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── GATE ── */
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.gate-box{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:36px 40px;text-align:center;width:320px;}
.gate-logo{width:44px;height:44px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;margin:0 auto 18px;}
.gate-title{font-size:18px;font-weight:700;margin-bottom:4px;}
.gate-sub{font-size:12px;color:var(--dim);margin-bottom:24px;}
.gate-input{width:100%;background:#1c1c1c;border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:8px;font-size:16px;font-family:inherit;text-align:center;letter-spacing:4px;outline:none;transition:border-color .15s;}
.gate-input:focus{border-color:var(--red);}
.gate-btn{width:100%;margin-top:12px;background:var(--red);border:none;color:#fff;padding:12px;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
.gate-btn:hover{filter:brightness(1.1);}
.gate-err{font-size:12px;color:#ff6b6b;margin-top:8px;height:16px;}

/* ── ADMIN SHELL ── */
#admin{display:none;min-height:100vh;}

/* ── HEADER ── */
.adm-hdr{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.adm-brand{display:flex;align-items:center;gap:10px;}
.adm-logo{width:30px;height:30px;background:var(--red);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;}
.adm-title{font-size:15px;font-weight:700;}
.adm-sub{font-size:11px;color:var(--dim);}
.adm-actions{display:flex;gap:8px;align-items:center;}
.btn{background:none;border:1px solid var(--border2);color:var(--dim);padding:6px 14px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .13s;}
.btn:hover{border-color:var(--text);color:var(--text);}
.btn-save{background:var(--green);border-color:var(--green);color:#000;font-weight:700;}
.btn-save:hover{filter:brightness(1.1);}
.btn-export{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:700;}
.btn-export:hover{filter:brightness(1.1);}
.btn-reset{border-color:rgba(228,5,33,.4);color:#ff7070;}
.btn-reset:hover{border-color:var(--red);color:var(--red);}
.save-indicator{font-size:11px;color:var(--green);opacity:0;transition:opacity .3s;}
.save-indicator.show{opacity:1;}

/* ── PROGRAM META ── */
.meta-bar{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:12px 24px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;
}
.meta-field{display:flex;align-items:center;gap:8px;}
.meta-field label{font-size:11px;color:var(--dim);white-space:nowrap;}
.meta-field input{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:5px;font-size:13px;font-family:inherit;width:160px;}
.meta-field input:focus{outline:none;border-color:var(--yellow);}

/* ── MAIN CONTENT ── */
.adm-body{padding:24px;}

/* ── CATEGORY ── */
.cat-section{margin-bottom:32px;}
.cat-title{
  font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.btn-add-model{font-size:11px;padding:3px 10px;border-color:rgba(0,212,122,.3);color:var(--green);}
.btn-add-model:hover{border-color:var(--green);}

/* ── MODEL CARD ── */
.model-card{
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;margin-bottom:10px;
}
.model-card-hdr{
  background:var(--s2);padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;
}
.model-card-hdr:hover{background:var(--s3);}
.model-card-name{font-size:14px;font-weight:600;}
.model-card-price{font-size:13px;color:var(--dim);}
.model-card-arrow{font-size:12px;color:var(--muted);}
.model-card-body{display:none;padding:16px;}
.model-card-body.open{display:block;}

/* ── FIELD GRID ── */
.field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:14px;}
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-group label{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);}
.field-group input,.field-group select{
  background:var(--s2);border:1px solid var(--border);color:var(--text);
  padding:7px 9px;border-radius:6px;font-size:14px;font-family:inherit;
}
.field-group input:focus,.field-group select:focus{outline:none;border-color:var(--blue);}
.field-group input.rate{border-color:rgba(74,158,255,.3);}
.field-group input.rate:focus{border-color:var(--blue);}
.field-group input.res{border-color:rgba(0,212,122,.3);}
.field-group input.res:focus{border-color:var(--green);}
.field-group input.money{border-color:rgba(245,166,35,.3);}
.field-group input.money:focus{border-color:var(--yellow);}

/* ── SECTION DIVIDER ── */
.field-section{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);margin:10px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* ── DELETE ── */
.btn-delete{font-size:11px;padding:3px 10px;border-color:rgba(228,5,33,.3);color:#ff7070;float:right;}
.btn-delete:hover{border-color:var(--red);background:rgba(228,5,33,.08);}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--s3);border:1px solid var(--border2);color:var(--text);padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;}
.toast.show{opacity:1;}
</style>

<!-- PASSWORD GATE -->
<div id="gate">

    <div class="gate-logo">⚙</div>

    <div class="gate-sub">Honda Programs Manager · Maple Honda</div>
    <input class="gate-input" id="pw" type="password" placeholder="Admin password"
      maxlength="10" onkeydown="if(event.key==='Enter')unlock()">
    <button class="gate-btn" onclick="unlock()">Sign In</button>
    <div class="gate-err" id="err"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin">

  <!-- HEADER -->
  <div class="adm-hdr">
    <div class="adm-brand">
      <div class="adm-logo">H</div>
      <div>
        <div class="adm-title">Honda Programs Admin</div>
        <div class="adm-sub">Maple Honda · Update monthly rates, prices & residuals</div>
      </div>
    </div>
    <div class="adm-actions">
      <span class="save-indicator" id="save-indicator">✓ Saved</span>
      <a href="rv-editor.html" target="_blank" class="btn btn-reset" style="text-decoration:none">% RV Editor ↗</a>
      <button class="btn btn-reset" onclick="confirmReset()">↺ Reset to Default</button>
      <button class="btn btn-export" onclick="exportFiles()">⬇ Export qt.html</button>
      <button class="btn btn-save" onclick="saveAll()">💾 Save All Changes</button>
    </div>
  </div>

  <!-- PROGRAM META -->
  <div class="meta-bar">
    <div class="meta-field">
      <label>Program Month</label>
      <input type="text" id="meta-month" placeholder="e.g. May 2026">
    </div>
    <div class="meta-field">
      <label>Offer Period</label>
      <input type="text" id="meta-period" placeholder="e.g. May 1 – May 31, 2026">
    </div>
    <div class="meta-field">
      <label>Model Year</label>
      <input type="number" id="meta-year" value="2026" min="2024" max="2030">
    </div>
    <div class="meta-field">
      <label>Data Pull Date</label>
      <input type="text" id="meta-date" placeholder="e.g. Apr 25, 2026">
    </div>
  </div>

  <!-- BODY -->
  <div class="adm-body">
    <!-- TABS -->
    <div style="display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;">
      <button id="tab-models" onclick="switchTab('models')"
        style="background:rgba(228,5,33,.1);border:none;border-bottom:2px solid var(--red);color:var(--text);padding:10px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;">
        🚗 Models & Rates
      </button>
      <button id="tab-residuals" onclick="switchTab('residuals')"
        style="background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);padding:10px 20px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;">
        📊 Residuals (Bulk)
      </button>
      <button id="tab-rates" onclick="switchTab('rates')"
        style="background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);padding:10px 20px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;">
        📋 Rates Program
      </button>
    </div>
    <div id="tab-models-body"></div>
    <div id="tab-residuals-body" style="display:none"></div>
    <div id="tab-rates-body" style="display:none"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

// ══════════════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════════════
const ADMIN_PW = '0512';
const STORAGE_KEY = 'mh_admin_models';
const META_KEY = 'mh_admin_meta';

function unlock(){
  if(document.getElementById('pw').value === ADMIN_PW){
    sessionStorage.setItem('mh_admin_auth','1');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
    init();
  } else {
    const e = document.getElementById('err');
    e.textContent = 'Incorrect password.';
    setTimeout(() => e.textContent = '', 2000);
    document.getElementById('pw').value = '';
  }
}
document.getElementById('pw').addEventListener('keydown', e => {
  if(e.key === 'Enter') unlock();
});

const DEFAULT_META = {
  month: 'April 2026',
  period: 'April 1 – April 30, 2026',
  year: 2026,
  date: 'Apr 25, 2026'
};

// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
let models = [];
let meta = {};

function init() {
  // Load from localStorage or use defaults
  const stored = localStorage.getItem(STORAGE_KEY);
  models = stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(DEFAULT_MODELS));
  const storedMeta = localStorage.getItem(META_KEY);
  meta = storedMeta ? JSON.parse(storedMeta) : {...DEFAULT_META};
  renderMeta();
  renderModels();
}

// ══════════════════════════════════════════════════════════════════
//  META
// ══════════════════════════════════════════════════════════════════
function renderMeta() {
  document.getElementById('meta-month').value = meta.month || '';
  document.getElementById('meta-period').value = meta.period || '';
  document.getElementById('meta-year').value = meta.year || 2026;
  document.getElementById('meta-date').value = meta.date || '';
}

function saveMeta() {
  meta.month  = document.getElementById('meta-month').value;
  meta.period = document.getElementById('meta-period').value;
  meta.year   = parseInt(document.getElementById('meta-year').value) || 2026;
  meta.date   = document.getElementById('meta-date').value;
  localStorage.setItem(META_KEY, JSON.stringify(meta));
}

// ══════════════════════════════════════════════════════════════════
//  RENDER MODELS
// ══════════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.getElementById('tab-models-body').style.display    = tab==='models'    ? 'block' : 'none';
  document.getElementById('tab-residuals-body').style.display = tab==='residuals' ? 'block' : 'none';
  document.getElementById('tab-rates-body').style.display     = tab==='rates'     ? 'block' : 'none';
  ['models','residuals','rates'].forEach(t => {
    const el = document.getElementById('tab-'+t);
    if (!el) return;
    const isActive = t === tab;
    el.style.background       = isActive ? (t==='models'?'rgba(228,5,33,.1)':t==='residuals'?'rgba(0,212,122,.08)':'rgba(74,158,255,.08)') : 'none';
    el.style.borderBottomColor= isActive ? (t==='models'?'var(--red)':t==='residuals'?'var(--green)':'var(--blue)') : 'transparent';
    el.style.color            = isActive ? (t==='models'?'var(--text)':t==='residuals'?'var(--green)':'var(--blue)') : 'var(--dim)';
  });
  if (tab === 'residuals') renderResiduals();
  if (tab === 'rates') renderRates();
}

function applyGroupRates(cat, idx) {
  const lr36 = parseFloat(document.getElementById('rr-lr36-'+idx).value) || null;

  const cats = [...new Set(models.map(m => m.cat))];

function updateResLive(input) {
  const id    = input.dataset.resId;
  const field = input.dataset.resField;
  const val   = parseFloat(input.value) || 0;
  const m     = models.find(x => x.id === id);
  if (!m) return;
  m[field] = val;
  // Update the dollar display live
  const msrp = m.msrp || 0;
  const cell = document.getElementById(field === 'rv36' ? `res36-${id}` : `res60-${id}`);
  if (cell) {
    const dollars = Math.round(msrp * val / 100);
    cell.innerHTML = `<span style="font-size:12px;color:var(--text);">$${dollars.toLocaleString()}</span>`;
  }
  // Debounce save
  clearTimeout(window._resTimer);
  window._resTimer = setTimeout(() => localStorage.setItem(STORAGE_KEY, JSON.stringify(models)), 600);
}
  const cats = [...new Set(models.map(m => m.cat))];

}

function toggleCard(id) {

// ══════════════════════════════════════════════════════════════════
//  SAVE
// ══════════════════════════════════════════════════════════════════
function collectFromDOM() {
  document.querySelectorAll('[data-id][data-field]').forEach(input => {
    const id = input.dataset.id;
    const field = input.dataset.field;
    const m = models.find(x => x.id === id);
    if (!m) return;
    const v = input.value.trim();
    if (v === '' || v === 'null') {
      m[field] = null;
    } else if (input.type === 'number') {
      m[field] = parseFloat(v);
    } else {
      m[field] = v;
    }
    // Update card header live
    const nameEl = document.querySelector(`#card-${id} .model-card-name`);
    if (nameEl) nameEl.textContent = `${m.yr || meta.year || 2026} ${m.name} ${m.trim}`;
    const priceEl = document.querySelector(`#card-${id} .model-card-price`);
    if (priceEl) priceEl.textContent = `$${(m.price||0).toLocaleString()}`;
  });
}

function saveAll() {
  saveMeta();
  collectFromDOM();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(models));
  const ind = document.getElementById('save-indicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 2500);
  showToast('✓ All changes saved to this browser');
}

function addModel(cat) {
  const newId = 'new-' + Date.now();
  const yr = meta.year || 2026;

function deleteModel(id) {
  if (!confirm('Delete this model? This cannot be undone.')) return;
  models = models.filter(m => m.id !== id);
  saveAll();
  renderModels();
  showToast('Model deleted');
}

function confirmReset() {
  if (!confirm('Reset ALL models to April 2026 defaults? Your changes will be lost.')) return;
  models = JSON.parse(JSON.stringify(DEFAULT_MODELS));
  meta = {...DEFAULT_META};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(models));
  localStorage.setItem(META_KEY, JSON.stringify(meta));
  renderMeta();
  renderModels();
  showToast('Reset to April 2026 defaults');
}

ass=\"logo-h\">H</div>\n    <div>\n      <div class=\"logo-text\">Honda Quick Quote</div>\n      <div class=\"logo-sub\">Maple Honda \u00b7 Henry Chen \u00b7 647-523-6878</div>\n    </div>\n  </div>\n  <div class=\"hdr-center\">\n    <div class=\"hdr-model-label\" id=\"hdr-model\">Select a model to begin</div>\n    <div class=\"hdr-promo\" id=\"hdr-promo\">\u26a1 HFS PROMO ACTIVE \u00b7 Expires Apr 30, 2026</div>\n  </div>\n  <div class=\"hdr-right\">\n    <div class=\"data-stamp\">\ud83d\udcc5 Prices pulled: Apr 25, 2026</div>\n    <div class=\"data-stamp\" style=\"color:var(--yellow)\">\u26a0 Estimate only \u2014 verify at honda.ca</div>\n    <div style=\"display:flex;gap:10px;justify-content:flex-end\">\n      <a href=\"compare.html\" style=\"font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:.3px;transition:color .15s\" onmouseover=\"this.style.color='var(--dim)'\" onmouseout=\"this.style.color='var(--muted)'\">\u2696 Compare</a>\n      <a href=\"admin.html\" style=\"font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:.3px;transition:color .15s\" onmouseover=\"this.style.color='var(--dim)'\" onmouseout=\"this.style.color='var(--muted)'\">\u2699 Admin</a>\n    </div>\n  </div>\n</div>\n\n<!-- QUICK QUOTE BANNER -->\n<div class=\"qq-banner\">\n  <div class=\"qq-left\">\u26a1 Quick Quote Tool \u00b7 For Reference Only</div>\n  <div class=\"qq-right\">For accurate pricing, rates &amp; residuals \u2192 <a href=\"https://www.honda.ca/en/buildyourhonda\" target=\"_blank\" style=\"color:var(--blue);font-weight:700;text-decoration:none;border-bottom:1px solid rgba(74,158,255,.4)\">honda.ca/en/buildyourhonda \u2197</a></div>\n</div>\n\n<!-- LAYOUT -->\n<div class=\"layout\">\n  <div class=\"sb\" id=\"sb\"></div>\n  <div class=\"main\" id=\"main\">\n    <div class=\"welcome\">\n      <div class=\"welcome-icon\">\ud83d\ude97</div>\n      <div>Select a model from the sidebar</div>\n      <div style=\"font-size:13px;color:var(--muted)\">3yr & 5yr lease \u00b7 5yr & 7yr finance \u00b7 monthly & bi-weekly \u00b7 down payment</div>\n    </div>\n  </div>\n</div>\n\n<div class=\"toast\" id=\"toast\"></div>\n\n<script>\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  DATA \u2014 Selling prices from Maple Honda internal sheet, April 25, 2026\n//  Lease & finance RATES confirmed from April 2026 Honda Programs (NAS081-26)\n//  Residuals = ESTIMATES \u2014 enter actual $ from HFS portal on each card\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nconst DATA_DATE = 'April 25, 2026';\n\nconst M = [/*%%MARRAY%%*/];\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  CALCULATOR\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction lmo(cap, res, mo, rate) {\n  const mf = rate / 2400;\n  return (cap - res) / mo + (cap + res) * mf;\n}\nfunction fmo(p, mo, rate) {\n  if (!rate) return p / mo;\n  const r = rate / 100 / 12;\n  return p * r * Math.pow(1+r,mo) / (Math.pow(1+r,mo)-1);\n}\nfunction fbw(p, mo, rate) {\n  if (!rate) return p / (mo * 26/12);\n  const r = rate / 100 / 26, n = Math.round(mo * 26/12);\n  return p * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1);\n}\nconst bw2mo = bw => bw * 26 / 12;\nconst mo2bw = mo => mo * 12 / 26;\nconst ca$   = n  => '$' + Math.round(n).toLocaleString('en-CA');\nconst ca$c  = n  => '$' + n.toFixed(2).replace(/\\B(?=(\\d{3})+(?!\\d))/g, ',');\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  STATE\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nlet cur = null, ov = {}, panelOpen = false;\nlet downPayment = 0;\nlet gapAmt = 2500;\nlet optColor = false, optWheelLock = false, optLeaseGuard = false;\nlet resOv = {};   // Per-model HFS residual overrides\nlet incOv = {};   // Per-model incentive overrides { modelId: number }\nlet priceOv = {}; // Per-model selling price override { modelId: number }\nlet msrpOv = {};  // Per-model MSRP override\nlet feesOv = {};  // Per-model fees total override\n\nfunction getIncAmt(m) {\n  // No default incentives \u2014 user enters manually via incOv\n  if (incOv[m.id] != null) return incOv[m.id];\n  return 0;\n}\n\nfunction getPriceOverride(m) {\n  if (priceOv[m.id] != null) return priceOv[m.id];\n  return m.price; // use original price from data (no incentive deduction by default)\n}\n\nfunction resetAll() {\n  downPayment = 0;\n  leaseEquity = 0;\n  tradeInVal = 0;\n  tradeInOwing = 0;\n  feesUpfront = false;\n  kmAllowance = 20000;\n  optColor = false;\n  optWheelLock = false;\n  optLeaseGuard = false;\n  optProtection = false;\n  warrantySelected = null;\n  warrantyOpen = false;\n  breakdownOpen = false;\n  panelOpen = false;\n  finWarrantyOpen = {};\n  leaseWarrantyOpen = {};\n  moreOptionsOpen = false;\n  if (cur) {\n    delete resOv[cur.id];\n    delete incOv[cur.id];\n    delete priceOv[cur.id];\n    delete msrpOv[cur.id];\n    delete feesOv[cur.id];\n    delete ov[cur.id];\n  }\n  render();\n  showToast('Reset \u2713');\n}\n\nfunction setResOv(term, val) {\n  if (!cur) return;\n  if (!resOv[cur.id]) resOv[cur.id] = {};\n  const v = parseFloat(val);\n  resOv[cur.id][term] = (val === '' || isNaN(v)) ? null : v;\n  render();\n}\n\nfunction getRes(m, term) {\n  const r = R(m);\n  const pct = term === 36 ? r.rv36 : r.rv60;\n  const override = resOv[m.id]?.[term];\n\n  // Manual dollar override always wins\n  if (override != null) {\n    return { val: override, pct: override / m.msrp, confirmed: true, src: 'Manual entry' };\n  }\n\n  // Use per-model confirmed km residual % table\n  if (m.resKm) {\n    const kmKey = kmAllowance >= 40000 ? 40000 : kmAllowance <= 12000 ? 12000 :\n                  kmAllowance <= 16000 ? 16000 : kmAllowance <= 20000 ? 20000 : 24000;\n    const resPct = m.resKm[kmKey] ?? pct;\n    const resVal = m.msrp * resPct;\n    const isExact = m.resKm[kmKey] !== undefined;\n    return { val: resVal, pct: resPct, confirmed: isExact, src: isExact ? `Honda Canada ${kmAllowance/1000}k km (confirmed)` : 'Estimate' };\n  }\n\n  // Standard: MSRP \u00d7 published % + km adjustment\n  const adjPct = pct + kmResAdjPct(kmAllowance);\n  const val = m.msrp * Math.max(0, adjPct);\n  return { val, pct: adjPct, confirmed: false, src: 'Honda Canada (est. km adj)' };\n}\n\n// KM adjustment: \u00b12 percentage points per 4,000 km/yr from 24k base\n// Basis: confirmed Passport data (12k=44%, 20k=42%, 24k=40%)\nfunction kmResAdjPct(km) {\n  const bands = (24000 - km) / 4000;  // positive = fewer km than 24k = higher residual\n  return bands * 0.02;\n}\n\n// Fee breakdown helper\nfunction getFees(m) {\n  const isSedan = ['Civic Sedan','Civic Hatchback','Accord','Prelude'].includes(m.cat);\n  const isSi    = m.id === 'cs-si';\n  const fpdi    = (isSedan || isSi) ? 1830 : 2000;\n  const isHybridOrEV = m.engine.includes('Hybrid') || m.engine.includes('Electric');\n  const tire    = (!isSedan && !isSi && !isHybridOrEV) ? 22 : 18;\n  const ac = 100, omvic = 22, env = 1, dealer = 1000;\n  const total = fpdi + ac + omvic + env + tire + dealer;\n  return { fpdi, ac, omvic, env, tire, dealer, total };\n}\n\nlet breakdownOpen = false;\nlet kmAllowance = 20000;\nlet tradeInVal = 0, tradeInOwing = 0, leaseEquity = 0, optProtection = false, feesUpfront = false;\n\n// Term selectors \u2014 which term to show on each of the 4 payment cards\nlet leaseTerm1 = 24;   // left lease card \u2014 starts at 24mo\nlet leaseTerm2 = 60;   // right lease card\nlet finTerm1   = 60;   // left finance card (default 5yr)\nlet finTerm2   = 84;   // right finance card (default 7yr)\n\n// All available terms\nconst LEASE_TERMS = [24, 30, 36, 42, 48, 54, 60];\nconst FIN_TERMS   = [24, 36, 48, 60, 72, 84, 96];\n\n// Get lease rate for any term using the model's lr36/lr60 as bands\nfunction lrForTerm(r, mo) {\n  if (mo <= 36) return r.lr36;\n  return r.lr60;\n}\n// Get finance rate for any term\nfunction frForTerm(r, mo) {\n  if (mo <= 60) return r.fr60;\n  return r.fr84;\n}\n// Get residual for any lease term\nfunction resForTerm(m, r, mo) {\n  return mo <= 36 ? getRes(m, 36) : (r.rv60 ? getRes(m, 60) : getRes(m, 36));\n}\n\n// Protection package costs by model tier (from honda.ca build tool, May 2025)\nfunction protCost(m) {\n  if (m.cat === 'Civic Sedan' || m.cat === 'Civic Hatchback') return 646;\n  if (['HR-V','Accord','Prelude'].includes(m.cat)) return 796;\n  if (m.cat === 'CR-V') return 896;\n  return 996; // Pilot, Odyssey, Ridgeline, Passport, Prologue\n}\n\n// Option bi-weekly costs\nconst OPT_COLOR          = 4.78;\nconst OPT_WHEELLOCK      = 1.50;\nconst OPT_LEASEGUARD_PRO = 14.00; // 5yr lease only\n\n// Global add-ons (colour + wheel locks only \u2014 Lease Guard Pro is 5yr lease card only)\nfunction optBW() {\n  return (optColor ? OPT_COLOR : 0)\n       + (optWheelLock ? OPT_WHEELLOCK : 0);\n}\n\nfunction getEffMsrp(m)  { return msrpOv[m.id] ?? m.msrp; }\nfunction getEffFees(m)  {\n  if (feesOv[m.id] != null) {\n    const f = getFees(m);\n    return { ...f, total: feesOv[m.id] };\n  }\n  return getFees(m);\n}\n\nfunction R(m) {\n  const o = ov[m.id] || {};\n  const incAdj = incOv[m.id] ?? 0;\n  return {\n    price: priceOv[m.id] ?? (m.price - incAdj),\n    lr36:  o.lr36  ?? m.lr[36],\n    lr60:  o.lr60  ?? m.lr[60],\n    rv36:  o.rv36  ?? m.rv[36],\n    rv60:  o.rv60  ?? m.rv[60],\n    fr60:  o.fr60  ?? m.fr[60],\n    fr84:  o.fr84  ?? m.fr[84],\n  };\n}\n\nlet warrantyOpen = false;\nlet warrantySelected = null; // { label, cost }\n\n// Honda Plus Comprehensive Protection Plan \u2014 prices as of May 2025\nconst WARRANTY_PLANS = [\n  {label:'5yr / 100,000 km', civic:1890, accord_crv_hrv:1980, big:2230, civic_hyb:2270, accord_crv_hyb:2560, prologue:3675},\n  {label:'6yr / 100,000 km', civic:2100, accord_crv_hrv:2290, big:2790, civic_hyb:2520, accord_crv_hyb:3140, prologue:4265},\n  {label:'6yr / 160,000 km', civic:2720, accord_crv_hrv:2920, big:3840, civic_hyb:3120, accord_crv_hyb:4370, prologue:5295},\n  {label:'7yr / 130,000 km', civic:2630, accord_crv_hrv:2780, big:3730, civic_hyb:2970, accord_crv_hyb:4260, prologue:5120},\n  {label:'7yr / 160,000 km', civic:2990, accord_crv_hrv:3220, big:4220, civic_hyb:3770, accord_crv_hyb:5050, prologue:5710},\n  {label:'7yr / 200,000 km', civic:3170, accord_crv_hrv:3720, big:5170, civic_hyb:4090, accord_crv_hyb:5560, prologue:null},\n  {label:'8yr / 130,000 km', civic:3070, accord_crv_hrv:3550, big:4930, civic_hyb:3800, accord_crv_hyb:5200, prologue:6150},\n  {label:'8yr / 200,000 km', civic:3400, accord_crv_hrv:4310, big:5630, civic_hyb:4460, accord_crv_hyb:6000, prologue:null},\n  {label:'10yr / 160,000 km',civic:3540, accord_crv_hrv:4440, big:5750, civic_hyb:4660, accord_crv_hyb:6200, prologue:null},\n];\n\nfunction warrantyTier(m) {\n  const isHyb = m.engine.includes('Hybrid') || m.engine.includes('Electric');\n  if (m.cat === 'Prologue') return 'prologue';\n  if (isHyb && (m.cat === 'Civic Sedan' || m.cat === 'Civic Hatchback')) return 'civic_hyb';\n  if (isHyb) return 'accord_crv_hyb'; // Accord H, CR-V H, Prelude\n  if (m.cat === 'Civic Sedan' || m.cat === 'Civic Hatchback' || m.id === 'cs-si') return 'civic';\n  if (['Accord','CR-V','HR-V'].includes(m.cat)) return 'accord_crv_hrv';\n  return 'big'; // Pilot, Odyssey, Ridgeline, Passport\n}\n\nfunction getWarrantyPrice(plan, tier) { return plan[tier] ?? null; }\n\nfunction renderWarrantyPanel(m) {\n  const tier = warrantyTier(m);\n  const tierLabel = {\n    civic:'Civic', civic_hyb:'Civic Hybrid',\n    accord_crv_hrv:'Accord / CR-V / HR-V',\n    accord_crv_hyb:'Accord / CR-V Hybrid',\n    big:'Pilot / Odyssey / Ridgeline / Passport',\n    prologue:'Prologue'\n  }[tier];\n\n  return `\n    <div class=\"bk-panel\" style=\"margin-bottom:16px\">\n      <div class=\"bk-tabs\">\n        <div style=\"padding:10px 16px;font-size:13px;font-weight:700;color:var(--text);flex:1\">\n          \ud83d\udee1 Honda Plus \u2014 Comprehensive Protection Plan\n          <span style=\"font-size:11px;font-weight:400;color:var(--dim);margin-left:8px\">${tierLabel} \u00b7 2025\u20132026 Model Year</span>\n        </div>\n        <button class=\"btn\" style=\"margin:6px 12px 6px auto;font-size:11px\" onclick=\"warrantyOpen=false;render()\">\u2715 Close</button>\n      </div>\n      <div class=\"bk-body\">\n        <div style=\"display:grid;grid-template-columns:1.4fr repeat(3,1fr);gap:0;border:1px solid var(--border);border-radius:7px;overflow:hidden;font-size:13px\">\n          <!-- Header -->\n          <div style=\"background:var(--s3);padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border)\">Plan</div>\n          <div style=\"background:var(--s3);padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border);border-left:1px solid var(--border);text-align:center\">MSRP ($)</div>\n          <div style=\"background:var(--s3);padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--green);border-bottom:1px solid var(--border);border-left:1px solid var(--border);text-align:center\">+GAP / Bi-Wkly</div>\n          <div style=\"background:var(--s3);padding:9px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border);border-left:1px solid var(--border);text-align:center\">Action</div>\n          ${WARRANTY_PLANS.map((p,i) => {\n            const cost = getWarrantyPrice(p, tier);\n            if (cost === null) return '';\n            const isSelected = warrantySelected?.label === p.label;\n            const r2 = R(m);\n            const cap = r2.price - downPayment;\n            const bw60 = fbw(cap + gapAmt + cost, 60, r2.fr60);\n            const bw84 = fbw(cap + gapAmt + cost, 84, r2.fr84);\n            const bg = isSelected ? 'background:rgba(0,212,122,.07)' : (i%2===0?'background:var(--s2)':'background:var(--s1)');\n            return `\n              <div style=\"${bg};padding:9px 12px;border-top:1px solid var(--border)\">${p.label}</div>\n              <div style=\"${bg};padding:9px 12px;border-top:1px solid var(--border);border-left:1px solid var(--border);text-align:center;font-weight:600\">$${cost.toLocaleString()}</div>\n              <div style=\"${bg};padding:9px 12px;border-top:1px solid var(--border);border-left:1px solid var(--border);text-align:center;color:var(--green);font-size:12px\">\n                5yr: ${ca$c(bw60)}/2wk<br>7yr: ${ca$c(bw84)}/2wk\n              </div>\n              <div style=\"${bg};padding:6px 12px;border-top:1px solid var(--border);border-left:1px solid var(--border);text-align:center\">\n                <button onclick=\"selectWarranty('${p.label}',${cost})\"\n                  style=\"background:${isSelected?'rgba(0,212,122,.2)':'none'};border:1px solid ${isSelected?'var(--green)':'var(--border2)'};color:${isSelected?'var(--green)':'var(--dim)'};padding:4px 12px;border-radius:4px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:${isSelected?700:400}\">\n                  ${isSelected ? '\u2713 Selected' : 'Select'}\n                </button>\n              </div>`;\n          }).join('')}\n        </div>\n        ${warrantySelected ? `\n          <div style=\"margin-top:12px;background:rgba(0,212,122,.06);border:1px solid var(--green-bdr);border-radius:7px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between\">\n            <div>\n              <div style=\"font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--green)\">\u2713 Selected: ${warrantySelected.label}</div>\n              <div style=\"font-size:12px;color:rgba(0,212,122,.6);margin-top:2px\">$${warrantySelected.cost.toLocaleString()} \u00b7 rolled into finance principal with GAP</div>\n            </div>\n            <button onclick=\"selectWarranty(null,0)\" style=\"background:none;border:1px solid var(--border2);color:var(--dim);padding:5px 10px;border-radius:4px;font-size:12px;font-family:inherit;cursor:pointer\">Remove</button>\n          </div>` : `<div style=\"font-size:11px;color:var(--dim);margin-top:10px\">Select a plan above to see it rolled into your finance payment. Prices as of May 2025 \u2014 dealer may sell for less.</div>`}\n      </div>\n    </div>`;\n}\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  SIDEBAR\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n(function buildSb() {\n  const cats = [...new Set(M.map(m => m.cat))];\n  document.getElementById('sb').innerHTML = cats.map(cat => `\n    <div class=\"sb-cat\">${cat}</div>\n    ${M.filter(m => m.cat === cat).map(m => `\n      <div class=\"sb-item\" id=\"si-${m.id}\" onclick=\"pick('${m.id}')\">\n        <div class=\"sb-name\">${m.name} <span class=\"trim\">${m.trim}</span></div>\n        <div class=\"sb-meta\">\n          <span class=\"dot\"></span>\n          <span>${ca$(m.price)}</span>\n          ${m.promo ? `<span class=\"promo-pill\">\u26a1${m.promo.rate}%</span>` : ''}\n        </div>\n      </div>\n    `).join('')}\n  `).join('');\n})();\n\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n//  PICK & RENDER\n// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\nfunction pick(id) {\n  cur = M.find(m => m.id === id);\n  if (!cur) return;\n  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));\n  document.getElementById('si-' + id)?.classList.add('active');\n  breakdownOpen = false;\n  warrantyOpen = false;\n  warrantySelected = null;\n  finWarrantyOpen = {};\n  leaseWarrantyOpen = {};\n  moreOptionsOpen = false;\n  leaseTerm1 = 24;\n  leaseTerm2 = 60;\n  finTerm1   = 60;\n  finTerm2   = 84;\n  leaseEquity = 0;\n  feesUpfront = false;\n  render();\n}\n\nfunction render() {\n  if (!cur) return;\n  const m = cur, r = R(m);\n  const fees = getEffFees(m);\n  const tradeInEquity = tradeInVal - tradeInOwing;\n  const tradeInPreTax = tradeInEquity / 1.13;\n  const leaseEquityPreTax = leaseEquity / 1.13;\n  const feesReduction = feesUpfront ? fees.total : 0;  // fees paid cash upfront, removed from cap\n  const cap  = r.price - downPayment - leaseEquityPreTax - tradeInPreTax - feesReduction;\n  const finP = cap;\n  const dynamicOTD = Math.max(0, cap) * 1.13;  // principal + 13% HST\n\n  // Dynamic lease calculations for selected terms\n  const getLeaseCard = (term) => {\n    const rt = lrForTerm(r, term);\n    const resObj = resForTerm(m, r, term);\n    if (!rt || !resObj) return null;\n    const mo = lmo(cap, resObj.val, term, rt);\n    return { mo, bw: mo2bw(mo), resObj, rt, confirmed: resObj.confirmed };\n  };\n\n  const lcard1 = getLeaseCard(leaseTerm1);\n  const lcard2 = getLeaseCard(leaseTerm2);\n\n  // Keep legacy vars for breakdown panel compatibility\n  const res36obj = getRes(m, 36);\n  const res60obj = r.rv60 ? getRes(m, 60) : null;\n  const res36 = res36obj.val;\n  const res60 = res60obj ? res60obj.val : null;\n  const res36confirmed = res36obj.confirmed;\n  const res60confirmed = res60obj ? res60obj.confirmed : false;\n  const l36mo = lmo(cap, res36, 36, r.lr36);\n  const l60mo = (r.lr60 && res60 !== null) ? lmo(cap, res60, 60, r.lr60) : null;\n  const l36bw = mo2bw(l36mo), l60bw = l60mo !== null ? mo2bw(l60mo) : null;\n\n  // Dynamic finance calculations for selected terms\n  const getFinCard = (term) => {\n    const rt = frForTerm(r, term);\n    if (!rt) return null;\n    return {\n      mo: fmo(finP, term, rt), bw: fbw(finP, term, rt),\n      mog: fmo(finP + gapAmt, term, rt), bwg: fbw(finP + gapAmt, term, rt),\n      mogp: fmo(finP + gapAmt + prot, term, rt), bwgp: fbw(finP + gapAmt + prot, term, rt),\n      rt\n    };\n  };\n  const fc1 = getFinCard(finTerm1);\n  const fc2 = getFinCard(finTerm2);\n\n  // Options add-on (bi-weekly \u2192 monthly)\n  const optBWval = optBW();\n  const optMOval = bw2mo(optBWval);\n\n  // Finance\n  const prot = optProtection ? protCost(m) : 0;\n  // fc1 and fc2 already calculated above via getFinCard()\n\n  // Legacy breakdown vars\n  const f60mo = fmo(finP, 60, r.fr60);\n  const f60bw = fbw(finP, 60, r.fr60);\n  const f84mo = fmo(finP, 84, r.fr84);\n  const f84bw = fbw(finP, 84, r.fr84);\n\n  const hasPromo = !!m.promo;\n  document.getElementById('hdr-model').textContent = `${m.name} ${m.trim} \u00b7 ${ca$(r.price)}`;\n  const hp = document.getElementById('hdr-promo');\n  if (hasPromo) hp.classList.add('show'); else hp.classList.remove('show');\n\n  document.getElementById('main').innerHTML = `\n\n    <!-- TOP -->\n    <div class=\"q-top\">\n      <div>\n        <div class=\"q-title\">${m.name} <span class=\"trim\">${m.trim}</span></div>\n        <div class=\"q-sub\">\n          <div class=\"q-price-block\">\n            <span class=\"q-price\">${ca$(r.price)}</span>\n            <span class=\"q-msrp\">MSRP ${ca$(m.msrp)}</span>\n          </div>\n          ${hasPromo ? `<span class=\"tag tag-promo\">\u26a1 ${m.promo.rate}% Promo \u00b7 Exp ${m.promo.exp}</span>` : ''}\n          <span class=\"tag tag-est\">Estimate</span>\n        </div>\n        <div class=\"q-engine\" style=\"margin-top:5px\">${m.engine} &nbsp;\u00b7&nbsp; ${m.drive}</div>\n      </div>\n      <div class=\"q-actions\">\n        <button class=\"btn\" onclick=\"resetAll()\" style=\"border-color:rgba(228,5,33,.4);color:#ff7070;font-weight:700\">\u21ba Reset</button>\n        <button class=\"btn btn-copy\" onclick=\"copyQ()\">\ud83d\udccb Copy</button>\n        <button class=\"btn\" id=\"bk-btn\" onclick=\"toggleBreakdown()\">${breakdownOpen?'\u25b2 Hide':'\ud83d\udcca Breakdown'}</button>\n        <button class=\"btn\" onclick=\"warrantyOpen=!warrantyOpen;render()\" style=\"${warrantySelected?'border-color:var(--green);color:var(--green)':''}\">\ud83d\udee1 Warranty${warrantySelected?' \u2713':''}</button>\n        <button class=\"btn\" onclick=\"printQuote()\" style=\"border-color:var(--border2)\">\ud83d\udda8 Print</button>\n        <button class=\"btn\" onclick=\"togglePanel()\">\u2699 Rates</button>\n      </div>\n    </div>\n\n    <!-- PRICE TABLE -->\n    <div class=\"price-table\" style=\"flex-wrap:wrap;gap:0;padding:0;\">\n      <!-- MSRP editable -->\n      <div class=\"pt-item\" style=\"flex-direction:col
