<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Honda Quick Ref</title>
<script>
if(typeof sessionStorage!=='undefined'&&sessionStorage.getItem('mh_qt_auth')!=='1'){
  window.location.replace('quote.html');
}
</script>
<style>
:root{
  --red:#E40521; --bg:#0a0a0a; --s1:#111; --s2:#181818; --s3:#222;
  --border:#272727; --text:#f0f0f0; --dim:#888; --muted:#3a3a3a;
  --blue:#4a9eff; --green:#00d47a; --yellow:#f5a623;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;font-size:15px;}

/* ── HEADER ── */
.hdr{
  background:var(--s1);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:50;
}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.logo{width:30px;height:30px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;}
.hdr-title{font-size:15px;font-weight:700;}
.hdr-sub{font-size:11px;color:var(--dim);}
.hdr-right{text-align:right;}
.data-date{font-size:10px;color:var(--muted);}

/* ── LAYOUT ── */
.layout{display:flex;height:calc(100vh - 57px);overflow:hidden;}

/* ── SIDEBAR ── */
.sb{
  width:155px; flex-shrink:0;
  background:var(--s1);
  border-right:1px solid var(--border);
  overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
.sb::-webkit-scrollbar{display:none;}
.sb-cat{
  font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--muted); padding:10px 12px 4px;
}
.sb-item{
  padding:9px 12px;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:background .1s;
}
.sb-item:active{background:var(--s2);}
.sb-item.active{background:rgba(228,5,33,.1);border-left-color:var(--red);}
.sb-name{font-size:13px;font-weight:500;line-height:1.2;color:var(--text);}
.sb-trim{font-size:11px;color:var(--dim);margin-top:2px;}
.sb-price{font-size:11px;font-weight:600;color:var(--text);margin-top:2px;}

/* ── MAIN ── */
.main{
  flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:14px;
}
.main::-webkit-scrollbar{display:none;}

/* ── WELCOME ── */
.welcome{
  padding:40px 20px;
  text-align:center;
  color:var(--dim);
}
.welcome-icon{font-size:48px;margin-bottom:12px;}
.welcome-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}
.welcome-sub{font-size:13px;line-height:1.6;}

/* ── VEHICLE HEADER ── */
.veh-hdr{margin-bottom:14px;}
.veh-name{font-size:20px;font-weight:800;letter-spacing:-.4px;line-height:1.2;}
.veh-trim{color:var(--dim);font-weight:400;}
.veh-meta{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;}
.veh-chip{
  font-size:11px;background:var(--s2);border:1px solid var(--border);
  padding:3px 8px;border-radius:4px;color:var(--dim);
}
.veh-chip.price{color:var(--text);font-weight:700;font-size:13px;background:rgba(228,5,33,.1);border-color:rgba(228,5,33,.25);}
.veh-chip.otd{color:var(--dim);}

/* ── PRICE SUMMARY ── */
.psum{
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;margin-bottom:10px;
  display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;
}
.psum-row{display:flex;flex-direction:column;gap:1px;}
.psum-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);}
.psum-val{font-size:14px;font-weight:700;color:var(--text);}
.psum-val.dim{color:var(--dim);font-weight:600;}
.psum-val.hi{color:var(--red);}

/* ── ADJUST INPUTS ── */
.adj{
  background:var(--s1);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;margin-bottom:12px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.adj-row{display:flex;flex-direction:column;gap:4px;}
.adj-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);}
.adj-input{
  width:100%;background:var(--s3);border:1px solid var(--border);
  color:var(--text);padding:7px 9px;border-radius:6px;
  font-size:14px;font-weight:600;font-family:inherit;outline:none;
  -moz-appearance:textfield;
}
.adj-input::-webkit-outer-spin-button,
.adj-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.adj-input:focus{border-color:var(--red);}
.adj-net{
  margin-top:8px;padding-top:8px;border-top:1px solid var(--border);
  grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;
}
.adj-net-lbl{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.adj-net-val{font-size:15px;font-weight:800;color:var(--text);}

/* ── SECTION LABEL ── */
.sec{
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);margin:14px 0 8px;
  display:flex;align-items:center;gap:8px;
}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── PAYMENT TABLE ── */
.pay-table{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:4px;
}
.pay-table-hdr{
  display:grid; grid-template-columns:50px 1fr 1fr 1fr;
  background:var(--s2);
  border-bottom:1px solid var(--border);
  padding:7px 10px;
}
.pay-table-hdr span{
  font-size:10px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;color:var(--dim);
  text-align:right;
}
.pay-table-hdr span:first-child{text-align:left;}
.pay-row{
  display:grid; grid-template-columns:50px 1fr 1fr 1fr;
  padding:9px 10px;
  border-bottom:1px solid var(--border);
  align-items:center;
}
.pay-row:last-child{border:none;}
.pay-row:active{background:var(--s2);}
.pay-mo{font-size:13px;font-weight:700;color:var(--text);}
.pay-rate{font-size:10px;color:var(--muted);margin-top:1px;}
.pay-amt{
  font-size:15px;font-weight:700;text-align:right;
}
.pay-amt.bw{color:var(--text);}
.pay-amt.mo{color:var(--dim);font-size:13px;font-weight:500;}
.pay-amt.na{color:var(--muted);font-size:12px;font-weight:400;}

/* ── TAX-IN INLINE TAG ── */
.tax-in-tag{font-size:9.5px;font-weight:500;color:var(--muted);margin-left:3px;letter-spacing:.2px;opacity:.85;}

/* ── RESIDUAL BADGE ── */
.res-line{
  font-size:11px;color:var(--blue);margin-top:3px;text-align:right;
}

/* ── DISCLAIMER ── */
.disc{
  margin-top:16px;padding:10px 12px;
  background:rgba(245,166,35,.05);
  border:1px solid rgba(245,166,35,.12);
  border-radius:8px;
  font-size:11px;color:var(--dim);line-height:1.6;
}

/* ── DESKTOP NOTICE (shows on desktop) ── */
.desktop-notice{
  display:none;
  position:fixed;bottom:16px;right:16px;
  background:var(--s2);border:1px solid var(--border);
  padding:10px 14px;border-radius:8px;
  font-size:12px;color:var(--dim);
}
@media(min-width:768px){.desktop-notice{display:block;}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="logo">H</div>
    <div>
      <div class="hdr-title">Quick Ref</div>
      <div class="hdr-sub">Maple Honda</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="data-date" id="data-date-stamp">📅 …</div>
    <div class="data-date" style="color:var(--yellow)">⚠ Estimate · Tax-in</div>
  </div>
</div>

<div class="layout">
  <div class="sb" id="sb"></div>
  <div class="main" id="main">
    <div class="welcome">
      <div class="welcome-icon">🚗</div>
      <div class="welcome-title">Honda Quick Reference</div>
      <div class="welcome-sub">Tap any model for instant<br>payment overview — all terms</div>
    </div>
  </div>
</div>

<div class="desktop-notice">
  For full features open on desktop →<br>
  <a href="qt.html" style="color:var(--blue)">Switch to Full Tool</a>
</div>

<script src="models-data.js"></script>
<script>
// Model data (M array) and DATA_UPDATE_DATE live in models-data.js

// ── CALCULATORS ───────────────────────────────────────────────────
function lmo(cap,res,mo,rate){
  const mf=rate/2400;
  return (cap-res)/mo+(cap+res)*mf;
}
function fmo(p,mo,rate){
  if(!rate)return p/mo;
  const r=rate/100/12;
  return p*r*Math.pow(1+r,mo)/(Math.pow(1+r,mo)-1);
}
function fbw(p,mo,rate){
  if(!rate)return p/(mo*26/12);
  const r=rate/100/26,n=Math.round(mo*26/12);
  return p*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}
const mo2bw=m=>m*12/26;
const ca$=n=>'$'+Math.round(n).toLocaleString('en-CA');
const ca$c=n=>'$'+n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');

// Lease terms with rate source: 24/30 use 36mo rate, 42/48/54 use 60mo rate
function lrForTerm(m,mo){
  if(mo<=36)return m.lr[36];
  return m.lr[60];
}
// Finance terms: ≤60 use fr60, >60 use fr84
function frForTerm(m,mo){
  if(mo<=60)return m.fr[60];
  return m.fr[84];
}
// Residual: use exact term from models-data.js rv table, fallback to nearest band
function resForTerm(m,mo){
  const pct = m.rv[mo] ?? (mo<=36 ? m.rv[36] : m.rv[60]);
  return Math.round(m.msrp * pct);
}

// ── ADJUSTMENTS STATE (tax-in dollars) ────────────────────────────
const HST = 1.13;
let curId = null;
const dpMap = {};   // { modelId: tax-in down payment }
const incMap = {};  // { modelId: tax-in incentive }
function getDP(id){ return dpMap[id] || 0; }
function getInc(id){ return incMap[id] || 0; }
function setDP(v){ if(!curId)return; dpMap[curId]=Math.max(0,parseFloat(v)||0); pick(curId); }
function setInc(v){ if(!curId)return; incMap[curId]=Math.max(0,parseFloat(v)||0); pick(curId); }

// ── DATE STAMP ────────────────────────────────────────────────────
document.getElementById('data-date-stamp').textContent = '📅 ' + DATA_UPDATE_DATE;

// ── SIDEBAR ───────────────────────────────────────────────────────
(function buildSb(){
  const cats=[...new Set(M.map(m=>m.cat))];
  document.getElementById('sb').innerHTML=cats.map(cat=>`
    <div class="sb-cat">${cat}</div>
    ${M.filter(m=>m.cat===cat).map(m=>`
      <div class="sb-item" id="si-${m.id}" onclick="pick('${m.id}')">
        <div class="sb-name">${m.name}</div>
        <div class="sb-trim">${m.trim}</div>
        <div class="sb-price">${ca$(m.price)}</div>
      </div>
    `).join('')}
  `).join('');
})();

// ── RENDER ────────────────────────────────────────────────────────
function pick(id){
  const m=M.find(x=>x.id===id);
  if(!m)return;
  curId=id;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('si-'+id)?.classList.add('active');

  // Adjustments (tax-in dollars from user)
  const dp=getDP(id), inc=getInc(id);
  const reductionTaxIn=dp+inc;
  const reductionPre=reductionTaxIn/HST;

  // Lease tax-in: compute pre-tax payment, then ×1.13
  // Pre-tax cap = price − (reductions converted to pre-tax)
  // Pre-tax residual = msrp × pct
  const leaseCapPre=Math.max(0, m.price - reductionPre);
  const leaseTerms=[24,30,36,42,48,54,60];
  const leaseRows=leaseTerms.map(mo=>{
    const rt=lrForTerm(m,mo);
    if(!rt)return {mo,na:true};
    const res=resForTerm(m,mo);
    const moPre=lmo(leaseCapPre,res,mo,rt);
    const moTax=moPre*HST;
    return {mo,rt,bw:mo2bw(moTax),mo_p:moTax,res};
  });

  // Finance tax-in: principal = OTD − reductions (both tax-in)
  const finPrincipal=Math.max(0, m.otd - reductionTaxIn);
  const finTerms=[24,36,48,60,72,84,96];
  const finRows=finTerms.map(mo=>{
    const rt=frForTerm(m,mo);
    if(!rt)return {mo,na:true};
    return {mo,rt,bw:fbw(finPrincipal,mo,rt),mo_p:fmo(finPrincipal,mo,rt)};
  });

  const netOTD=Math.max(0, m.otd - reductionTaxIn);

  document.getElementById('main').innerHTML=`
    <div class="veh-hdr">
      <div class="veh-name">${m.year||2026} ${m.name} <span class="veh-trim">${m.trim}</span></div>
      <div class="veh-meta">
        <span class="veh-chip">${m.engine}</span>
        <span class="veh-chip">${m.drive}</span>
      </div>
    </div>

    <div class="psum">
      <div class="psum-row">
        <div class="psum-lbl">MSRP</div>
        <div class="psum-val dim">${ca$(m.msrp)}</div>
      </div>
      <div class="psum-row">
        <div class="psum-lbl">Selling Price</div>
        <div class="psum-val dim">${ca$(m.price)}</div>
      </div>
      <div class="psum-row">
        <div class="psum-lbl">OTD (tax-in)</div>
        <div class="psum-val">${ca$(m.otd)}</div>
      </div>
      <div class="psum-row">
        <div class="psum-lbl">HST included</div>
        <div class="psum-val dim">${ca$(m.otd-m.price)}</div>
      </div>
    </div>

    <div class="sec">Down Payment & Incentive (tax-in)</div>
    <div class="adj">
      <div class="adj-row">
        <div class="adj-lbl">Down Payment</div>
        <input class="adj-input" type="number" inputmode="numeric" min="0" step="100"
          value="${dp||''}" placeholder="$0"
          onchange="setDP(this.value)"
          onkeydown="if(event.key==='Enter'){setDP(this.value);this.blur();}">
      </div>
      <div class="adj-row">
        <div class="adj-lbl">Incentive / Rebate</div>
        <input class="adj-input" type="number" inputmode="numeric" min="0" step="100"
          value="${inc||''}" placeholder="$0"
          onchange="setInc(this.value)"
          onkeydown="if(event.key==='Enter'){setInc(this.value);this.blur();}">
      </div>
      <div class="adj-net">
        <span class="adj-net-lbl">Net OTD (tax-in)</span>
        <span class="adj-net-val">${ca$(netOTD)}</span>
      </div>
    </div>

    <div class="sec" style="color:var(--blue)">Lease · tax-in payments</div>
    <div class="pay-table">
      <div class="pay-table-hdr">
        <span>Term</span>
        <span>Rate</span>
        <span>Bi-Wkly</span>
        <span>Monthly</span>
      </div>
      ${leaseRows.map(r=>r.na?`
        <div class="pay-row">
          <span class="pay-mo">${r.mo}mo</span>
          <span></span>
          <span class="pay-amt na" style="grid-column:3/5;text-align:right">STD rate</span>
        </div>
      `:`
        <div class="pay-row">
          <div>
            <div class="pay-mo">${r.mo}mo</div>
          </div>
          <div style="font-size:11px;color:var(--muted);text-align:right">${r.rt}%</div>
          <div class="pay-amt bw" style="text-align:right">${ca$c(r.bw)}<span class="tax-in-tag">incl tax</span></div>
          <div class="pay-amt mo" style="text-align:right">${ca$c(r.mo_p)}<span class="tax-in-tag">incl tax</span></div>
        </div>
      `).join('')}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:14px;text-align:right">Residuals estimated · payments include 13% HST</div>

    <div class="sec" style="color:var(--green)">Finance · tax-in payments · ${ca$(finPrincipal)} principal</div>
    <div class="pay-table">
      <div class="pay-table-hdr">
        <span>Term</span>
        <span>Rate</span>
        <span>Bi-Wkly</span>
        <span>Monthly</span>
      </div>
      ${finRows.map(r=>r.na?`
        <div class="pay-row">
          <span class="pay-mo">${r.mo}mo</span>
          <span></span>
          <span class="pay-amt na" style="grid-column:3/5;text-align:right">STD rate</span>
        </div>
      `:`
        <div class="pay-row">
          <div class="pay-mo">${r.mo}mo</div>
          <div style="font-size:11px;color:var(--muted);text-align:right">${r.rt}%</div>
          <div class="pay-amt bw" style="text-align:right">${ca$c(r.bw)}<span class="tax-in-tag">incl tax</span></div>
          <div class="pay-amt mo" style="text-align:right">${ca$c(r.mo_p)}<span class="tax-in-tag">incl tax</span></div>
        </div>
      `).join('')}
    </div>

    <div class="disc">
      ⚠ All payments tax-in (13% HST) · residuals are estimates.
      For full quote tool: <a href="qt.html" style="color:var(--blue)">Open Desktop Tool ↗</a>
    </div>
    <div style="text-align:center;padding:10px 0 4px;font-size:11px;color:var(--muted)">
      🛠 Tech Support: <a href="tel:6475236878" style="color:var(--dim);text-decoration:none">647-523-6878</a>
    </div>
  `;
}
</script>
</body>
</html>
