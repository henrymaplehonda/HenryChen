<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23E40521'/><text x='50' y='76' font-size='72' text-anchor='middle' fill='white' font-weight='900' font-family='Arial,sans-serif'>$</text></svg>">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare — CleanQuotes</title>
<script>if(typeof sessionStorage!=='undefined'&&sessionStorage.getItem('mh_qt_auth')!=='1'){window.location.replace('quote.html');}</script>
<style>
:root{
  --red:#E40521;--bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#222;
  --border:#272727;--border2:#333;--text:#f0f0f0;--dim:#ccc;--muted:#999;
  --blue:#4a9eff;--green:#00d47a;--yellow:#f5a623;--purple:#a87cf5;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:16px;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── HEADER ── */
.hdr{background:var(--s1);border-bottom:1px solid var(--border);height:52px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.logo{width:30px;height:30px;background:var(--red);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;}
.hdr-title{font-size:15px;font-weight:700;}
.hdr-sub{font-size:11px;color:var(--dim);}
.hdr-nav{display:flex;gap:8px;}
.btn{background:none;border:1px solid var(--border2);color:var(--dim);padding:6px 13px;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .13s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.btn:hover{border-color:var(--text);color:var(--text);}
.btn-print{border-color:var(--border2);}
.btn-print:hover{border-color:var(--green);color:var(--green);}
.btn-clear{border-color:rgba(228,5,33,.3);color:#ff7070;}
.btn-clear:hover{border-color:var(--red);}

/* ── SLOT PICKER ── */
.picker-bar{background:var(--s1);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.picker-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--dim);flex-shrink:0;}
.slots{display:flex;gap:10px;flex-wrap:wrap;flex:1;}
.slot{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;min-width:200px;cursor:pointer;transition:all .15s;position:relative;}
.slot:hover{border-color:var(--border2);}
.slot.active{border-color:var(--red);background:rgba(228,5,33,.06);}
.slot.filled{border-color:var(--border2);}
.slot-num{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.slot-name{font-size:13px;font-weight:600;color:var(--text);}
.slot-price{font-size:11px;color:var(--dim);margin-top:2px;}
.slot-clear{position:absolute;top:6px;right:8px;font-size:14px;color:var(--muted);cursor:pointer;line-height:1;}
.slot-clear:hover{color:#ff7070;}
.slot.empty .slot-name{color:var(--muted);}

/* ── MODEL PICKER MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:12px;width:520px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}
.modal-search{padding:10px 14px;border-bottom:1px solid var(--border);}
.modal-search input{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px;font-family:inherit;outline:none;}
.modal-search input:focus{border-color:var(--red);}
.modal-list{overflow-y:auto;flex:1;}
.modal-cat{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);padding:10px 16px 4px;}
.modal-item{padding:10px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-item:hover{background:var(--s2);}
.modal-item-name{font-size:13px;font-weight:500;}
.modal-item-trim{font-size:11px;color:var(--dim);margin-top:1px;}
.modal-item-price{font-size:13px;font-weight:600;color:var(--text);}

/* ── COMPARE TABLE ── */
.compare-wrap{flex:1;overflow-x:auto;padding:20px;}
.compare-table{border-collapse:collapse;width:100%;min-width:640px;}

/* Row types */
.ct-section td{background:var(--s2);padding:8px 14px;font-size:12px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--dim);border-top:2px solid var(--border2);}
.ct-row td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:top;}
.ct-row:hover td{background:rgba(255,255,255,.02);}
.ct-label{font-size:14px;color:var(--dim);width:160px;}
.ct-val{font-size:16px;font-weight:600;text-align:center;}
.ct-val.big{font-size:26px;font-weight:800;letter-spacing:-.5px;}
.ct-val.dim{color:var(--dim);font-size:14px;font-weight:400;}
.ct-val.green{color:var(--green);}
.ct-val.blue{color:var(--blue);}
.ct-val.red{color:#ff7070;}
.ct-val.yellow{color:var(--yellow);}
.ct-val.best{background:rgba(0,212,122,.08);border-radius:5px;}

/* Header row */
.ct-hdr td{padding:12px 14px;background:var(--s1);border-bottom:2px solid var(--border);text-align:center;font-weight:700;font-size:14px;position:sticky;top:0;z-index:5;}
.ct-hdr td:first-child{text-align:left;color:var(--dim);font-size:11px;letter-spacing:.5px;text-transform:uppercase;}

/* Term selectors */
.term-sel{background:var(--s3);border:1px solid rgba(74,158,255,.3);color:var(--blue);padding:4px 7px;border-radius:5px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;outline:none;width:100%;margin-bottom:6px;}
.term-sel.fin{border-color:rgba(0,212,122,.3);color:var(--green);}

/* Empty state */
.ct-empty{text-align:center;padding:60px;color:var(--muted);}
.ct-empty-icon{font-size:40px;margin-bottom:12px;}

/* ── DOWN PAYMENT BTNS ── */
.dp-btn{background:none;border:1px solid var(--border2);color:var(--dim);padding:5px 12px;border-radius:5px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .13s;}
.dp-btn:hover{border-color:var(--text);color:var(--text);}
.dp-btn.active{background:rgba(228,5,33,.12);border-color:var(--red);color:#ff7070;font-weight:600;}

/* PRINT */
@media print{
  .hdr,.picker-bar,.hdr-nav,.modal-overlay{display:none!important;}
  .compare-wrap{padding:10px;}
  body{background:#fff;color:#111;}
  .ct-section td{background:#f5f5f5;color:#555;border-top:2px solid #ddd;}
  .ct-row td{border-bottom:1px solid #ddd;}
  .ct-hdr td{background:#f0f0f0;border-bottom:2px solid #ddd;}
  .ct-val.big{font-size:22px;}
  @page{margin:12mm;size:landscape;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="logo">H</div>
    <div>
      <div class="hdr-title">Quick Compare</div>
      <div class="hdr-sub">Maple Honda · Compare up to 3 models</div>
    </div>
  </div>
  <div class="hdr-nav">
    <button class="btn btn-clear" onclick="clearAll()">✕ Clear All</button>
    <button class="btn btn-print" onclick="window.print()">🖨 Print Comparison</button>
    <a class="btn" href="qt.html">← Full Tool</a>
  </div>
</div>

<!-- SLOT PICKER -->
<div class="picker-bar">
  <span class="picker-label">Compare:</span>
  <div class="slots" id="slots"></div>
  <div id="data-stamp" style="font-size:11px;color:var(--muted);margin-left:auto">⚠ Estimates only</div>
</div>

<!-- MODEL PICKER MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title">Select Model</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-search"><input id="search" placeholder="Search model or trim..." oninput="filterModels(this.value)"></div>
    <div class="modal-list" id="modal-list"></div>
  </div>
</div>

<!-- DOWN PAYMENT BAR -->
<div style="background:var(--s1);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
  <span style="font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--dim);flex-shrink:0;">Down Payment</span>
  <div style="display:flex;gap:7px;flex-wrap:wrap;" id="dp-presets">
    <button class="dp-btn active" id="dpb0" onclick="setDp(0)">$0</button>
    <button class="dp-btn" id="dpb500" onclick="setDp(500)">$500</button>
    <button class="dp-btn" id="dpb1000" onclick="setDp(1000)">$1,000</button>
    <button class="dp-btn" id="dpb2000" onclick="setDp(2000)">$2,000</button>
    <button class="dp-btn" id="dpb5000" onclick="setDp(5000)">$5,000</button>
  </div>
  <div style="display:flex;align-items:center;gap:7px;margin-left:auto;">
    <span style="font-size:12px;color:var(--dim);white-space:nowrap;">Custom $</span>
    <input type="number" min="0" step="500" id="dp-custom" placeholder="0"
      style="width:100px;background:var(--s2);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:5px;font-size:13px;font-family:inherit;outline:none;"
      oninput="setDp(parseInt(this.value)||0,true)"
      onfocus="this.style.borderColor='var(--red)'"
      onblur="this.style.borderColor='var(--border)'">
  </div>
</div>

<!-- COMPARE TABLE -->
<div class="compare-wrap">
  <div id="compare-out">
    <div class="ct-empty">
      <div class="ct-empty-icon">⚖️</div>
      <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Select models to compare</div>
      <div>Click a slot above to pick up to 3 Honda models</div>
    </div>
  </div>
</div>

<div style="text-align:center;padding:10px;font-size:11px;color:var(--muted);">
  🛠 Tech Support: <a href="tel:6475236878" style="color:var(--dim);text-decoration:none;">647-523-6878</a>
</div>

<script src="models-data.js"></script>
<script>
// Model data (M array) lives in models-data.js — shared with qt.html
document.getElementById('data-stamp').textContent = DATA_UPDATE_DATE + ' · ⚠ Estimates only';

// ── CALC ───────────────────────────────────────────────────────────
function lmo(c,r,mo,rt){const mf=rt/2400;return(c-r)/mo+(c+r)*mf;}
function fmo(p,mo,rt){if(!rt)return null;const r=rt/100/12;return p*r*Math.pow(1+r,mo)/(Math.pow(1+r,mo)-1);}
function fbw(p,mo,rt){if(!rt)return null;const r=rt/100/26,n=Math.round(mo*26/12);return p*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);}
const mo2bw=m=>m*12/26;
const ca$=n=>'$'+Math.round(n).toLocaleString('en-CA');
const ca$c=n=>'$'+n.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');

// ── STATE ─────────────────────────────────────────────────────────
let slots = [null, null, null]; // up to 3 models
let activeSlot = 0;
let leaseTerm = 24, finTerm = 60, downPayment = 0;
const LEASE_TERMS = [24,30,36,42,48,54,60];
const FIN_TERMS   = [24,36,48,60,72,84,96];

function setDp(v, fromInput=false) {
  downPayment = v;
  if (!fromInput) {
    const inp = document.getElementById('dp-custom');
    if (inp) { inp.value = v > 0 ? v : ''; }
  }
  document.querySelectorAll('.dp-btn').forEach(b => b.classList.remove('active'));
  const preset = document.getElementById('dpb' + v);
  if (preset) preset.classList.add('active');
  renderCompare();
}

// ── SLOTS UI ──────────────────────────────────────────────────────
function renderSlots() {
  document.getElementById('slots').innerHTML = [0,1,2].map(i => {
    const m = slots[i];
    if (!m) return `
      <div class="slot empty ${activeSlot===i?'active':''}" onclick="openModal(${i})">
        <div class="slot-num">Vehicle ${i+1}</div>
        <div class="slot-name">+ Add model</div>
      </div>`;
    return `
      <div class="slot filled ${activeSlot===i?'active':''}" onclick="openModal(${i})">
        <span class="slot-clear" onclick="event.stopPropagation();removeSlot(${i})">✕</span>
        <div class="slot-num">Vehicle ${i+1}</div>
        <div class="slot-name">${m.year} ${m.name}</div>
        <div class="slot-price">${m.trim} · ${ca$(m.price)}</div>
      </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────
function openModal(slotIdx) {
  activeSlot = slotIdx;
  renderSlots();
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('search').value = '';
  filterModels('');
  setTimeout(() => document.getElementById('search').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function filterModels(q) {
  const cats = [...new Set(M.map(m=>m.cat))];
  const lq = q.toLowerCase();
  document.getElementById('modal-list').innerHTML = cats.map(cat => {
    const items = M.filter(m => m.cat===cat && (
      !lq || m.name.toLowerCase().includes(lq) || m.trim.toLowerCase().includes(lq)
    ));
    if (!items.length) return '';
    return `<div class="modal-cat">${cat}</div>` +
      items.map(m => `
        <div class="modal-item" onclick="selectModel('${m.id}')">
          <div>
            <div class="modal-item-name">${m.year} ${m.name} ${m.trim}</div>
            <div class="modal-item-trim">${m.engine} · ${m.drive}</div>
          </div>
          <div class="modal-item-price">${ca$(m.price)}</div>
        </div>`).join('');
  }).join('');
}

function selectModel(id) {
  slots[activeSlot] = M.find(m=>m.id===id);
  closeModal();
  renderSlots();
  renderCompare();
}

function removeSlot(i) {
  slots[i] = null;
  renderSlots();
  renderCompare();
}

function clearAll() {
  slots = [null,null,null];
  renderSlots();
  renderCompare();
}

// ── COMPARE TABLE ─────────────────────────────────────────────────
function renderCompare() {
  const active = slots.filter(Boolean);
  if (!active.length) {
    document.getElementById('compare-out').innerHTML = `
      <div class="ct-empty">
        <div class="ct-empty-icon">⚖️</div>
        <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px">Select models to compare</div>
        <div>Click a slot above to pick up to 3 Honda models</div>
      </div>`;
    return;
  }

  const cap = m => m.price - downPayment;

  // Lease calcs
  const lrt  = m => leaseTerm <= 36 ? m.lr[36] : m.lr[60];
  const lrvp  = m => m.rv[leaseTerm] ?? (leaseTerm <= 36 ? m.rv[36] : m.rv[60]);
  const lres  = m => Math.round(m.msrp * lrvp(m));
  const lbw   = m => { const rt=lrt(m); if(!rt)return null; return mo2bw(lmo(cap(m),lres(m),leaseTerm,rt)); };
  const lmop  = m => { const rt=lrt(m); if(!rt)return null; return lmo(cap(m),lres(m),leaseTerm,rt); };

  // Finance calcs
  const frt = m => {
    if (finTerm <= 60) return m.fr[60];
    if (finTerm <= 84) return m.fr[84];
    return m.fr[96] ?? 6.69;
  };
  const fbwv  = m => { const rt=frt(m); if(!rt)return null; return fbw(cap(m),finTerm,rt); };
  const fmov  = m => { const rt=frt(m); if(!rt)return null; return fmo(cap(m),finTerm,rt); };

  // Highlight best (lowest) value
  const best = (arr, fn) => {
    const vals = arr.map(fn).map(v=>v!=null?parseFloat(v.replace(/[^0-9.]/g,'')):Infinity);
    const min = Math.min(...vals);
    return arr.map((_,i) => vals[i]===min && min !== Infinity);
  };

  const nCols = active.length;
  const colW  = `${Math.floor(85/nCols)}%`;

  // (down payment controlled by top bar)

  const bestLbw = best(active, m => { const v=lbw(m); return v ? ca$c(v) : 'Z'; });
  const bestFbw = best(active, m => { const v=fbwv(m); return v ? ca$c(v) : 'Z'; });

  function valCell(val, isBest, color='') {
    const cls = ['ct-val', 'big', color, isBest?'best':''].filter(Boolean).join(' ');
    return `<td class="${cls}">${val || '<span style="color:var(--muted);font-size:13px">STD</span>'}</td>`;
  }

  document.getElementById('compare-out').innerHTML = `
    <table class="compare-table">
      <!-- HEADER -->
      <tr class="ct-hdr">
        <td>
          <div style="font-size:10px;color:var(--dim);letter-spacing:.5px;">
            ${downPayment>0?`Down: <strong style="color:var(--text)">$${downPayment.toLocaleString()}</strong>`:''}
          </div>
        </td>
        ${active.map((m,i) => `
          <td>
            <div style="font-size:15px;font-weight:800;letter-spacing:-.3px">${m.year} ${m.name}</div>
            <div style="font-size:12px;color:var(--dim);margin-top:2px">${m.trim}</div>
          </td>`).join('')}
      </tr>

      <!-- PRICING -->
      <tr class="ct-section"><td colspan="${nCols+1}">Pricing</td></tr>
      <tr class="ct-row">
        <td class="ct-label">MSRP</td>
        ${active.map(m=>`<td class="ct-val dim">${ca$(m.msrp)}</td>`).join('')}
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Selling Price</td>
        ${active.map((m,i)=>{
          const isLow = best(active, x=>ca$(x.price))[i];
          return `<td class="ct-val ${isLow?'best green':''}" style="font-size:17px;font-weight:700">${ca$(m.price)}</td>`;
        }).join('')}
      </tr>
      <tr class="ct-row">
        <td class="ct-label">OTD (incl 13% HST)</td>
        ${active.map(m=>`<td class="ct-val dim">${ca$(m.otd)}</td>`).join('')}
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Engine · Drive</td>
        ${active.map(m=>`<td class="ct-val dim" style="font-size:12px">${m.engine}<br>${m.drive}</td>`).join('')}
      </tr>

      <!-- LEASE -->
      <tr class="ct-section">
        <td colspan="${nCols+1}" style="display:flex;align-items:center;gap:10px;">
          Lease
          <select class="term-sel" onchange="leaseTerm=parseInt(this.value);renderCompare()"
            style="width:auto;display:inline-block">
            ${LEASE_TERMS.map(t=>`<option value="${t}" ${t===leaseTerm?'selected':''}>${t} months</option>`).join('')}
          </select>
        </td>
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Rate</td>
        ${active.map(m=>{const rt=lrt(m);return`<td class="ct-val blue" style="font-size:14px">${rt?rt+'% APR':'STD'}</td>`;}).join('')}
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Bi-Weekly</td>
        ${active.map((m,i)=>valCell(lbw(m)?ca$c(lbw(m))+'<span class="tax-tag">+tax</span>':null, bestLbw[i], 'blue')).join('')}
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Monthly</td>
        ${active.map(m=>`<td class="ct-val dim">${lmop(m)?ca$c(lmop(m))+'<span class="tax-tag">+tax</span>':'STD'}</td>`).join('')}
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Est. Residual</td>
        ${active.map(m=>`<td class="ct-val dim" style="font-size:12px">${ca$(lres(m))} (${(lrvp(m)*100).toFixed(0)}%) ⚠est</td>`).join('')}
      </tr>

      <!-- FINANCE -->
      <tr class="ct-section">
        <td colspan="${nCols+1}" style="display:flex;align-items:center;gap:10px;">
          Finance
          <select class="term-sel fin" onchange="finTerm=parseInt(this.value);renderCompare()"
            style="width:auto;display:inline-block">
            ${FIN_TERMS.map(t=>`<option value="${t}" ${t===finTerm?'selected':''}>${t} months</option>`).join('')}
          </select>
        </td>
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Rate</td>
        ${active.map(m=>{const rt=frt(m);return`<td class="ct-val green" style="font-size:14px">${rt?rt+'% APR':'STD'}</td>`;}).join('')}
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Bi-Weekly</td>
        ${active.map((m,i)=>valCell(fbwv(m)?ca$c(fbwv(m))+'<span class="tax-tag">+tax</span>':null, bestFbw[i], 'green')).join('')}
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Monthly</td>
        ${active.map(m=>`<td class="ct-val dim">${fmov(m)?ca$c(fmov(m))+'<span class="tax-tag">+tax</span>':'STD'}</td>`).join('')}
      </tr>
      <tr class="ct-row">
        <td class="ct-label">Total Payments (est)</td>
        ${active.map(m=>{
          const mo=fmov(m);
          return`<td class="ct-val dim" style="font-size:12px">${mo?ca$(mo*finTerm):'—'}</td>`;
        }).join('')}
      </tr>
    </table>
    <div style="font-size:11px;color:var(--muted);padding:10px 0;text-align:right">
      ✅ Highlighted = lowest value · ⚠ Residuals estimated · $0 down unless changed · before HST
    </div>`;
}

// ── INIT ──────────────────────────────────────────────────────────
renderSlots();
renderCompare();
filterModels('');
</script>
</body>
