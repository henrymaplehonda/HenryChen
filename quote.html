<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blitz Deal v1.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0a;font-family:'Segoe UI',system-ui,sans-serif;}
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;}
.box{background:#111;border:1px solid #272727;border-radius:12px;padding:36px 40px;text-align:center;width:320px;}
.logo{width:44px;height:44px;background:#E40521;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;margin:0 auto 18px;}
.title{font-size:18px;font-weight:700;color:#f0f0f0;margin-bottom:4px;}
.sub{font-size:12px;color:#555;margin-bottom:24px;}
input{width:100%;background:#1c1c1c;border:1px solid #272727;color:#f0f0f0;padding:12px 14px;border-radius:8px;font-size:16px;font-family:inherit;text-align:center;letter-spacing:4px;outline:none;transition:border-color .15s;}
input:focus{border-color:#E40521;}
button{width:100%;margin-top:12px;background:#E40521;border:none;color:#fff;padding:12px;border-radius:8px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
button:hover{background:#c8041d;}
.err{font-size:12px;color:#ff6b6b;margin-top:8px;height:16px;}
#tool{display:none;width:100%;height:100vh;}
#tool iframe{width:100%;height:100%;border:none;}
</style>
</head>
<body>
<div id="gate">
  <div class="box">
    <div class="logo">H</div>
    <div class="title">Blitz Deal v1.0</div>
    <div class="sub">Maple Honda · Internal Tool</div>
    <input id="pw" type="password" placeholder="Enter password" maxlength="20"
      onkeydown="if(event.key==='Enter')unlock()">
    <button onclick="unlock()">Access</button>
    <div class="err" id="err"></div>
  </div>
</div>
<div id="tool"></div>
<script>
const PW='0512', SK='mh_qt_auth';
function unlock(){
  if(document.getElementById('pw').value===PW){
    sessionStorage.setItem(SK,'1');
    show();
  } else {
    const e=document.getElementById('err');
    e.textContent='Incorrect password.';
    setTimeout(()=>e.textContent='',2000);
    document.getElementById('pw').value='';
  }
}
function show(){
  document.getElementById('gate').style.display='none';
  const t=document.getElementById('tool');
  t.style.display='block';
  t.innerHTML='<iframe src="qt.html" title="Blitz Deal v1.0"></iframe>';
}
if(sessionStorage.getItem(SK)==='1') show();
</script>
</body>
</html>
